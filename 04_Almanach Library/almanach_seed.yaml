# almanach_seed.yaml
# First-run seed for Almanach (folder-aware).
#
# HOW IT WORKS
#   Each source lists only its homepage `url`. At load the app resolves
#   feed_url + discovery_method (discovery.discover), display_name (feed <title>),
#   and colour (palette round-robin) — exactly the path _seed_if_empty already uses.
#   So nothing here goes stale: dead feeds are skipped, not fatal.
#
#   Folders nest two levels: track -> category (depth 2, within the depth-5 cap).
#   Each source belongs to exactly ONE folder (Source.folder_id is single).
#
# RATINGS (per source, 3 levels: high | medium | low)
#   reliability — how established / trustworthy the source is.
#   impact      — how unique/strong its news is and how well it serves my purpose.
#
# SCHEMA NOTE
#   `reliability` and `impact` are NOT yet columns on Source (DATA_MODEL.md §1.1).
#   Adding them is an additive migration scoped as a CR; until it lands the loader
#   can ignore both fields. Once the columns exist they round-trip on YAML export.

meta:
  schema: almanach-seed/v1
  generated: "2026-05-25"
  rating_values: [high, medium, low]
  import_mode: first_run_only      # load when DB has no sources, then leave alone
  source_field: url                # feed_url/method/name/colour derived at load

