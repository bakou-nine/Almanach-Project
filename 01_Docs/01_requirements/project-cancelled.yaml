  body: "# EP05 — Setup & Self-Hosting\n\n## Feature Navigation Flows\n\n(Features\
    \ pending — next §5.1.1 round.)\n\n---\n\n## Body\n\nWhat turns a fresh checkout\
    \ into a running app. A local launcher\n(`python -m almanach` or equivalent) spawns\
    \ FastAPI, runs DB migrations,\nstarts the scheduler. First-run experience seeds\
    \ the DB with 10–15 popular\nsources. README covers install + run. Base error\
    \ handling surfaces RSS\ndiscovery failures, paywall visual cues, and network\
    \ errors in the UI\ninstead of crashing the app.\n\n**Key functional areas:**\n\
    \n- Local launcher entry point.\n- DB migration / first-run schema bootstrap.\n\
    - 10–15 pre-configured seed sources loaded on first run.\n- README (install, run,\
    \ configure).\n- Error handling: RSS discovery failure, paywall visual cue, network\n\
    \  errors surfaced to the user.\n- Responsive breakpoint at 720px (narrow viewport\
    \ behaviour).\n\n**Out of scope:**\n\n- Docker / RPi / VPS deployment (charter\
    \ §3, §8 — Phase 4+).\n- Automated install scripts beyond the README.\n- Always-on\
    \ / systemd integration (charter §3 — Phase 4+).\n- Multi-user / authentication\
    \ (charter §3 — out of scope entirely).\n\n**Reference documents:**\n\n- README.md\
    \ (to be authored).\n- 04_content/html/mockup.html (responsive layout).\n\n---\n"
