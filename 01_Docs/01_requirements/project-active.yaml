        # FT — Scheduler Lifecycle & Cadence

        ## Wireframes

        (Backend service — no UI surface. Header refresh button surface lives in FT-260522-2050-002.)

        ---

        ## Body

        Minimum decomposition of EP-260512-2230-003 needed to host the AC fix-verifying BUG-260521-2051-001 defects #1 and #3 (auto-sync-on-open). Two stories: (a) the periodic scheduler that fires every N minutes while the app is up (default 10 min per BUG02 reset, range 5–120 min configurable), and (b) the one-shot poll fired at app open so the most recent open is reflected as last-sync.

        Does NOT cover poll-state tracking (last_polled_at writes are exercised here but the per-source error / consecutive-failure tracking is deferred), polite-fetcher rules (1 req / 2 s / domain throttle), or robots.txt honouring — those remain in EP-260512-2230-003 body as future-feature scope pending separate §5.1.1 rounds.

        **Out of scope:**

        - Per-source interval override (charter §3 — global only).
        - Polite-fetcher / robots.txt enforcement (separate future feature under EP03).
        - Per-source error tracking and exponential backoff (future feature).
        - Manual refresh wiring from the header button — that lives in FT-260522-2050-002 US-260522-2050-004.

        **Reference documents:**

        - DATA_MODEL.md §Source.last_polled_at (to be authored).
        - Charter §3 (default 20 min, range 5–120 min, configurable; BUG-260521-2051-001 reset target value to 10 min).

