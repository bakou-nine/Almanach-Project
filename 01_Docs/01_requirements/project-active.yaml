  body: "# BUG — Feed article-row rendering not uniform\n\n## Defect Summary\nIn the\
    \ right-pane \"Latest news\" feed (FT-260522-2230-001), article rows\nviolate\
    \ the standard card contract (AC-260522-2231-001 layout truth: single\ncolour-dot\
    \ · source · relative time / bold title / two-line summary). Three\nobservable\
    \ faults, per TEST-260525-0700-001 §1 (human, 2026-05-25): (a) each\nrow shows\
    \ TWO colour pastilles instead of one — the single dot should match\nthe source's\
    \ sidebar colour\n(01_Docs/04_content/images/pastille colours.png); (b) parts\
    \ of the\nbody/summary render incorrectly (garbled / broken fragments) on some\
    \ articles\n(01_Docs/04_content/images/body not rendered correclty.png); (c) only\
    \ the\nfirst portion of the list renders in the correct standard format — rows\n\
    further down (scroll-appended batches) diverge\n(01_Docs/04_content/images/standard\
    \ format.png,\n01_Docs/04_content/images/compact news and reduce title lenght.png).\
    \ Expected:\nevery row, including continuous-scroll appended batches, renders\
    \ identically\nin the single-dot standard card layout.\n\n---\n\n## Affected Requirements\
    \ (CONFIRMS targets)\n- `FT-260522-2230-001` — Continuous-Scroll Feed — failing\
    \ the feed-card\n  standard-format contract (AC-260522-2231-001, AC-260523-0900-030)\
    \ across\n  initial render AND scroll-appended batches.\n\n---\n\n## Technical\
    \ Approach\n\n**Files / functions to change:**\n- `02_code/almanach/templates/`\
    \ (feed / article-card partial) — single\n  colour-dot markup; one shared card\
    \ template for initial + appended rows.\n- `02_code/almanach/static/js/app.js`\
    \ — scroll-append path must reuse the\n  same card template as the server-rendered\
    \ initial batch.\n- `02_code/almanach/app.py` — `/feed-partial` fragment must\
    \ emit markup\n  identical to first render.\n- `02_code/almanach/static/css/style.css`\
    \ — remove the second pastille;\n  ensure summary/body text is not truncated/garbled.\n\
    \n**Root cause:**\nTo confirm at fix time — likely the scroll-append fragment\
    \ uses a different\n(legacy) card template than the initial server render, and\
    \ a second\nstatus/colour pastille is emitted alongside the source colour-dot.\n\
    \n**Fix outline:**\nUnify the article-card template so initial render and `after=`\
    \ append produce\nidentical markup; emit exactly one colour-dot bound to `Source.colour`;\
    \ verify\nsummary/body text renders cleanly.\n\n---\n"
