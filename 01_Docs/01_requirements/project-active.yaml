    # BUG — Mixed published_at formats break chronological ordering

    ## Defect Summary

    Feed entries store normalised naive-UTC timestamps (ingestion.py:28-33) but sitemap entries store the raw text of news:publication_date / lastmod (ingestion.py:192-200), commonly with a timezone offset. Every sort, infinite-scroll cursor, and date filter compares these strings lexicographically (models.py:322-327, 366-368, 410), so ordering and from/to bounds are silently wrong wherever formats mix. Related: prune_old_articles (models.py:541) compares 'T'-separated fetched_at against SQLite datetime('now') which uses a space separator, skewing same-day boundaries.

    ---

    ## Affected Requirements (CONFIRMS targets)

    - `US-260513-0000-003` — Sitemap Fallback — failing AC: AC-260704-0735-004
    - `US-260522-2230-003` — Continuous-Scroll Feed — failing AC: AC-260522-2235-001, AC-260704-0735-004
    - `US-260523-1906-001` — Feed Filter Bar — failing AC: AC-260523-1500-002

    ---

    ## Technical Approach

    **Files / functions to change:**
    - `02_code/almanach/ingestion.py` — sitemap entry construction (normalise publication_date/lastmod)
    - `02_code/almanach/models.py` — prune_old_articles boundary; one-off migration of existing rows

    **Root cause:**
    Only the feedparser path normalises timestamps; the sitemap path persists raw source text, and all comparisons are string-based.

    **Fix outline:**
    Parse and normalise every published_at to one naive-UTC ISO format at write time; migrate existing rows once; align prune_old_articles to the same format so string comparison equals chronological comparison.
