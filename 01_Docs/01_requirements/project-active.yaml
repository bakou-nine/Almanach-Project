        cancellation_reason: null
        story_statement: I want to probe common feed paths on the host, so that I
          can resolve a feed URL for sites that follow the /feed
        tags: []
        body: 'Step 2 of the FT02 waterfall. Called by US-260513-0000-004 only

          when US-260513-0000-001 (head scan) returns `success: false`.

          For each path in `["/feed", "/rss", "/atom.xml"]` (in that fixed

          order), issues a `HEAD` request to `{homepage_url}{path}` with a

          2 s timeout. Considers the path a hit when the response is 200

          AND the Content-Type matches one of: `application/rss+xml`,

          `application/atom+xml`, `application/xml`, `text/xml`.

          Short-circuits on the first hit and returns

          `{step: "common_path", success: true, feed_url}`. If all three

          paths fail the check: returns

          `{step: "common_path", success: false, reason: "all_common_paths_404"}`.

          Stateless.


          **Data model fields touched:**


          - (none — stateless function.)


          **Spec reference:** DATA_MODEL.md §1.1 Source (`feed_url`,

          `discovery_method` target values).

          '
        acceptance_criteria: null
