        story_statement: As a reader, I want a filter bar at the top of the feed that
          lets me constrain articles by date range, so that I see only the articles
          relevant to my current focus.
        tags: []
        body: 'Hosts the filter-bar UI introduced by CR-260523-1500-001 — sibling
          story under

          FT-260522-2230-001, kept separate from US-260522-2230-003 to stay within
          §3.6 AC

          thresholds. The bar sits above the continuous-scroll feed and applies an
          additive

          (AND) predicate to the feed query: an explicit date range (max 1-year span)
          or a

          1d / 1w / 1m shortcut, a cumulative Group / Subgroup / Source multi-select,
          plus

          one or more keyword chips that combine via an Any/All toggle (CR-260524-0644-001);

          each keyword may be added case-sensitive and/or whole-word via options chosen
          at

          add time, with an explicit Add button supplementing Enter (CR-260524-1315-001).

          Active filters surface as removable chips with a Clear-all; an empty intersection

          shows a filter-specific empty state. Cross-filter composition with the sidebar

          scope (US-260523-1906-002) is asserted at feature level by AC-260523-1501-004.


          **Data model fields touched:**


          - `Article.published_at` (read — date predicate)

          - `Article.source_id`, `Source.group_id`, `Source.subgroup_id` (read — content
          predicate)


          **Spec reference:** CR-260523-1500-001 §Change Summary; DATA_MODEL.md §3

          (`idx_article_published_at`). Filter-bar wireframe pending §5.1.2.

          '
