    # BUG — No request sequencing on feed/sidebar re-renders

    ## Defect Summary

    refreshFeed()/refreshSidebar() (app.js ~159-242) assign fetched HTML with no AbortController, sequence counter, or debounce; rapid filter or sidebar-selection changes can resolve out of order so a stale response overwrites the newer feed. readFeedCursor (app.js:189) resets state.feedLoading while a loadMoreFeed batch is in flight; when it resolves it appends the previous filter's rows into the new list. End-of-feed is inferred by regex-counting class="article" in returned HTML (app.js:226-228), which is brittle.

    ---

    ## Affected Requirements (CONFIRMS targets)

    - `US-260523-1906-001` — Feed Filter Bar — failing AC: AC-260704-0735-007
    - `US-260525-0745-001` — Sidebar Selection Drives the Feed Filter — failing AC: AC-260704-0735-007
    - `US-260522-2230-003` — Continuous-Scroll Feed — failing AC: AC-260704-0735-008

    ---

    ## Technical Approach

    **Files / functions to change:**
    - `02_code/almanach/static/js/app.js` — refreshFeed, refreshSidebar, loadMoreFeed, readFeedCursor, applyFilterChange

    **Root cause:**
    Unsequenced concurrent fetches mutate the same DOM regions; the scroll cursor state is reset independently of the in-flight request it belongs to.

    **Fix outline:**
    Introduce a monotonic request token (or AbortController) per pane; drop responses whose token is stale; bind each loadMoreFeed batch to the filter-state token active at dispatch and discard on mismatch; replace regex end-of-feed detection with an explicit server-provided signal.
