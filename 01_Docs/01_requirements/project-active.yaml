    # BUG — Deferred transactions and check-then-act sequences race across threads

    ## Defect Summary

    Three writer threads (event loop, scheduler, watcher) share the DB, but db.transaction() (db.py:146-154) never issues BEGIN IMMEDIATE, so read-modify-write sequences run under deferred locks. Manifestations: create_source dup-check and insert run in separate transactions (app.py:299 / models.py:76-83) — two concurrent adds of the same URL pass the check and the loser surfaces an unhandled IntegrityError 500 instead of the friendly duplicate message; next_palette_colour (settings_store.py:50-63) can hand out duplicate colours; stage_import (portability.py:250-261) clears staging then inserts one transaction per row, so /review mid-import shows an empty or partial proposal set.

    ---

    ## Affected Requirements (CONFIRMS targets)

    - `US-260512-2300-002` — Server-side Dedup Check — failing AC: AC-260704-0735-005
    - `US-260512-2300-003` — Discovery Dispatch & Source Persistence — failing AC: AC-260512-2300-006
    - `US-260525-1200-003` — Watcher stages an updated library automatically — failing AC: AC-260704-0735-006

    ---

    ## Technical Approach

    **Files / functions to change:**
    - `02_code/almanach/db.py` — transaction() (BEGIN IMMEDIATE)
    - `02_code/almanach/app.py` — create_source (catch IntegrityError → 409 duplicate response)
    - `02_code/almanach/portability.py` — stage_import / apply_staging (single transaction)
    - `02_code/almanach/settings_store.py` — next_palette_colour (atomic under immediate lock)

    **Root cause:**
    Python sqlite3 defers the write lock until first DML; check-then-act logic spans transactions, so interleavings violate the invariants the code assumes.

    **Fix outline:**
    Issue BEGIN IMMEDIATE in db.transaction(); wrap staging clear+insert (and apply) in one transaction; catch IntegrityError on source insert and return the existing duplicate response; keep palette read-increment inside one immediate transaction.
