      # EP03 — Background Polling

      ## Feature Navigation Flows

      (Features pending — next §5.1.1 round.)

      ---

      ## Body

      The scheduler that wakes every N minutes (5–120, default 20), iterates the
      source list, and triggers the EP02 ingestion path for each non-paused
      source. Polite-fetcher rules enforce 1 request per 2 s per domain, respect
      robots.txt, and send a polite User-Agent. Runs only while the app process
      is up (no daemon; charter §3 out-of-scope).

      **Key functional areas:**

      - APScheduler integration and lifecycle (start on boot, stop on shutdown).
      - Global polling interval setting (5–120 min, default 20).
      - Per-source poll-state tracking (last_polled_at, last_error, consecutive
        failure count).
      - Polite-fetcher rules: robots.txt honouring, custom User-Agent, 1 req /
        2 s / domain throttle.
      - Manual refresh trigger wired from the EP04 header refresh button.

      **Out of scope:**

      - Per-source interval override (charter §3 — global only).
      - Smart cadence auto-detection from publish history (Phase 4+).
      - Always-on / daemonised polling (charter §3 — Phase 4+).
      - Feed parsing logic (see EP02).

      **Reference documents:**

      - DATA_MODEL.md §Source.last_polled_at, §Source.last_error (to be authored).
      - AUDIT_MODEL.md §PollEvent (to be authored).

