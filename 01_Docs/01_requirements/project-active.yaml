      \ on the left, combined feed\non the right (newest-first, **continuous scroll**\
      \ — no page nav).\nHeader bar above both panes shows app title plus\n\"last\
      \ sync · N min ago\" and a manual refresh button. Clicking an\narticle opens\
      \ it in a new browser tab and marks it as read\n(one-way; charter §3 out-of-scope).\n\
      \n**Key functional areas:**\n\n- Two-pane layout template + responsive breakpoint\
      \ at 720px.\n- Sidebar rendering: source rows, active state, muted state visual,\n\
      \  unread-count pills, \"All sources\" virtual entry at top.\n- Continuous-scroll\
      \ feed (newest-first, batches of 50, append on\n  scroll-near-bottom — owned\
      \ by US-260522-2230-003,\n  CR-260522-2101-001 iteration 2).\n- Article row\
      \ layout: every card uses the same full layout\n  (colour-dot · source · relative-time\
      \ / bold title / two-line\n  summary) — no compact variant. Per\n  01_Docs/04_content/images/screenshot.png\
      \ and AC-260522-2231-001\n  (design-fidelity AC under CR-260522-2101-001).\n\
      - Click-to-read: open new tab, write read_at on Article.\n- Header bar: app\
      \ title + last-sync indicator + manual refresh\n  button (wires to EP03 manual\
      \ refresh).\n\n**Out of scope:**\n\n- Multi-mode feed sort (charter §3 — newest-first\
      \ only).\n- Per-article tag pills (charter §3 out-of-scope).\n- Manual mark-as-unread\
      \ (charter §3 — read state is one-way).\n- Native mobile apps (responsive web\
      \ only).\n- Source CRUD (see EP01).\n- Article ingestion / storage (see EP02).\n\
      - Pagination chrome (prev / next page nav) — removed by\n  CR-260522-2101-001\
      \ iteration 2 in favour of continuous scroll.\n\n**Reference documents:**\n\n\
      - UI_SPEC.md §TwoPaneLayout, §Sidebar, §Feed, §Header (to be\n  authored).\n\
      - 04_content/html/mockup.html (whole-screen reference — pre-CR).\n- 01_Docs/04_content/images/screenshot.png\
      \ (target design — post-CR\n  iteration 2).\n\n---\n"
