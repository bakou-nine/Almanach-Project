  body: '## Description

    Date-range filter — explicit-window mode. The picker accepts a start and end date
    and enforces a maximum window of 365 days; selecting an end date more than one
    year after the start is rejected inline. The feed re-renders to show only articles
    with `published_at` in [start, end] (inclusive on both ends).


    ## Test Instructions


    1. Open the date-range picker.

    2. Select a start date 7 days before today and an end date of today. Apply.

    3. Verify the feed re-renders and shows only articles whose `published_at` falls
    within the selected window.

    4. Re-open the picker and attempt to set an end date more than 365 days after
    the start. Verify an inline error appears (e.g. "Range cannot exceed 1 year")
    and the apply action is blocked.

    5. Clear the date range. Verify the feed returns to its default (no date constraint).

    '
