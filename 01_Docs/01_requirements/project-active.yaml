  body: "# CR — Sidebar-driven filter selection\n\n## Change Summary\nPer TEST-260525-0700-001\
    \ §2–§3 (human, 2026-05-25), the sidebar selection and\nthe right-pane content\
    \ filter are disconnected: clicking a title on the left\ndoes not flag the matching\
    \ content in the filter\n(01_Docs/04_content/images/bug as left pane selection\
    \ is not propagated in the right pane filter.png),\nand there is no way to build\
    \ a multi-source selection from the sidebar\n(01_Docs/04_content/images/multiple\
    \ titles and sources selection with the filter pressing shift and clicking on\
    \  multiple ones.png).\nThis CR adds new behaviour: a sidebar click drives the\
    \ filter selection;\nshift-click enables cumulative multi-select with toggle-deselect;\
    \ clicking a\nparent propagates to descendants, which the user can then individually\
    \ untick.\nNew behaviour → hosted by the new story US-260525-0745-001 (keeps\n\
    US-260523-1906-001 under its §3.6 AC threshold).\n\n---\n\n## Affected Requirement\
    \ Objects\n| ID — Title | Action | Status transition |\n| :--- | :--- | :--- |\n\
    | `US-260525-0745-001` — Sidebar Selection Drives the Feed Filter | added | (new)\
    \ → OPEN |\n\n---\n\n## Design Changes\nNew interaction (no new screen): sidebar\
    \ rows gain selected/multi-selected\nvisual state mirrored into the filter dropdown\
    \ checkboxes. Wireframe pending\n§5.1.2.\n\n## Data Model Changes\n(none) — selection\
    \ state is client-side; predicate reuses existing\n`Source.group_id` / `Source.subgroup_id`\
    \ / `Article.source_id` reads.\n\n## Supersede / Versioning\n(none)\n\n## Scope\
    \ Impact Assessment\n- **Features affected:** FT-260522-2230-001 (new child story)\n\
    - **Features blocked:** (none)\n- **Features unblocked:** (none)\n- **Regression\
    \ risk:** medium — must not break existing sidebar feed-scope\n  (US-260523-1906-002)\
    \ or the filter bar's own controls (US-260523-1906-001);\n  the single-active-row\
    \ scope contract must stay coherent with multi-select.\n- **Breaking changes:**\
    \ (none)\n\n---\n"
