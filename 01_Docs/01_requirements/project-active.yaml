        cancellation_reason: null
        story_statement: I want to scan a homepage's HTML head for RSS or Atom alternate-link
          tags, so that I can resolve a feed URL when the source publishes one explicitly.
        tags: []
        body: "Step 1 of the FT02 waterfall. Takes a homepage URL, performs a\n`GET`\
          \ with a 5 s timeout, parses the HTML `<head>` element, and\nlooks for any\
          \ `<link rel=\"alternate\">` whose `type` is\n`application/rss+xml` or `application/atom+xml`.\
          \ On match:\nresolves the `href` to an absolute URL (handling\nprotocol-relative\
          \ and path-relative forms) and returns\n`{step: \"alternate_link\", success:\
          \ true, feed_url}`. On no match\nin the head: returns\n`{step: \"alternate_link\"\
          , success: false, reason: \"no_alternate_link\"}`.\nOn HTTP failure (timeout,\
          \ 4xx, 5xx, DNS error): returns\n`{step: \"alternate_link\", success: false,\
          \ reason: \"fetch_error\", details}`.\nStateless — no DB reads or writes.\n\
          \n**Data model fields touched:**\n\n- (none — stateless function. Caller\
          \ US-260513-0000-004 maps the\n  success result onto `Source.feed_url` and\
          \ `Source.discovery_method`.)\n\n**Spec reference:** DATA_MODEL.md §1.1\
          \ Source (`feed_url`,\n`discovery_method` target values).\n"
        acceptance_criteria: null
        relations:
