        # FT — Media Content Projects

        ## Wireframes

        High-fidelity design handoff (Claude design, HTML/React prototype):
        [interactive prototype](01_docs/03_design/02_claude design handoffs/Media Content Projects creation/Almanach.html)
        — spec in the bundle's README.md (screens 3, 5, 7; tokens final).

        ---

        ## Body

        Save any feed article into named collections ("projects"). Sidebar gains a
        PROJECTS section below Sources (create via "+", inline rename, delete,
        count pill per project). Each article row gains a bookmark button; clicking
        it or the row ⋮ menu's "Save to project" entry opens a save-to-project popover
        (checkbox per project + inline create-new; the title is not a trigger — title
        click opens the article, per BUG-260704-1629-001). Articles saved to ≥1 project show folder tags
        under their title. Clicking a project (sidebar row or tag) switches the feed
        to a project view listing its saved articles, with "Back to news" to return.
        Persistence is server-side (DATA_MODEL.md §1.6/§2.5), not the prototype's
        localStorage. Visuals follow the handoff tokens/layout exactly.

        **Out of scope:**

        - Redesigned When/Sources/Keyword filter bar from the same handoff bundle
          (existing Feed Filter Bar US stands; change would be a CR).
        - Sharing/exporting projects; projects in the portability YAML (§9).
        - Ordering/notes/tags inside a project (saved-set only).

        **Reference documents:**

        - 01_docs/03_design/02_claude design handoffs/Media Content Projects creation/README.md (authoritative spec)
        - DATA_MODEL.md §1.6 (Project), §2.5 (Project ↔ Article)
