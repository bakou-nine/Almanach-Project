        story_statement: As a reader, I want clicking and shift-clicking sources,
          so that I can build a multi-source filter directly from the sidebar.
        tags: []
        body: "Adds two-way coupling between the sidebar selection and the right-pane\n\
          content-selection filter (US-260523-1906-001 dropdown). A plain click on\
          \ a\nGroup / Subgroup / Source title ticks the matching filter entries (and\n\
          unticks the rest) so the filter mirrors the sidebar selection; this extends\n\
          the feed-scope behaviour of US-260523-1906-002 (which only scoped the feed)\n\
          to also drive the filter UI. Shift-click adds rows cumulatively\n(multi-select);\
          \ shift-clicking an already-selected row removes it. Clicking\na parent\
          \ (Group) propagates the checked state to all its descendant sources\nin\
          \ the filter, after which the user may untick individual descendants\nwithout\
          \ losing the rest. Sits alongside US-260523-1906-001 (filter bar) and\n\
          US-260523-1906-002 (sidebar scope) under FT-260522-2230-001; introduced\
          \ by\nCR-260525-0745-002.\n\n**Data model fields touched:**\n\n- `Source.group_id`,\
          \ `Source.subgroup_id`, `Article.source_id` (read — map\n  a sidebar selection\
          \ to its member sources and the filter predicate)\n\n**Spec reference:**\
          \ CR-260525-0745-002 §Change Summary; existing filter bar\n(US-260523-1906-001)\
          \ and sidebar scope (US-260523-1906-002). Wireframe\npending §5.1.2.\n"
