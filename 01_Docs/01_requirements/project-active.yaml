  body: "# CR — Design revamp\n\n## Change Summary\n\nCosmetic re-skin of the Feed\
    \ Reading Experience (EP-260512-2230-004) to the target\nmockup 01_Docs/04_content/images/design\
    \ revamp.png. Confirmed scope: cosmetic re-skin\nplus one keyword-control simplification\
    \ — layout and matching logic preserved.\nVisible changes:\n- Header: dark rounded-square\
    \ app mark + green sync-status dot before the\n  \"Last sync · …\" text.\n- Filter\
    \ bar: WHEN / SOURCES / KEYWORD unified into one rounded bordered toolbar; the\n\
    \  1d/1w/1m/Custom shortcuts become a joined segmented control with the active\
    \ window\n  shown filled.\n- Keyword cluster restyled to sit in the toolbar. The\
    \ per-keyword Match case / Match\n  whole word buttons are replaced by a single\
    \ blue \"Exact match\" toggle inline with the\n  input and Add button (good.png):\
    \ Exact match on = whole-word match (case-insensitive), off =\n  loose case-insensitive\
    \ substring. Other CR-260524-1315-001 behaviour is preserved\n  (Enter/Add, removable\
    \ chips, Match any/all toggle); committed chips now show a\n  single \"Exact match\"\
    \ badge.\nSidebar unchanged; \"New group\" stays as the header folder-plus icon\
    \ (confirmed).\n\n## Affected Requirement Objects\n\n- FT-260522-2050-002 (Header\
    \ Bar Last-Sync Indicator) — header mark + green dot.\n- FT-260522-2230-001 (Continuous-Scroll\
    \ Feed) — filter toolbar, segmented WHEN,\n  keyword restyle (single Exact match\
    \ toggle), feed-pane visual fidelity.\n(= this CR's CONFIRMS set; both reopened\
    \ to OPEN per §5.2.2.)\n\n## Design Changes\n\nCSS-led in 02_code/almanach/static/css/style.css,\
    \ reusing :root tokens (a new\n--accent-green token added for the status dot)\
    \ — no raw values in new rules:\n.app-header mark + status dot; .filter-row restyled\
    \ as a single rounded/bordered\ntoolbar with labelled segments; .date shortcuts\
    \ wrapped in a .segmented joined\ncontrol; keyword cluster condensed. The per-keyword\
    \ Match case / Match whole word\nbuttons are removed in favour of a single .keyword-exact-toggle\
    \ (blue switch per\ngood.png; the prior yellow --accent-highlight token and the\
    \ .keyword-opt-btn /\n.kw-opt-label / .keyword-pending rules are removed). app.js:\
    \ a sticky\nstate.filter.exactMode flag; a word commits immediately on Enter/Add\
    \ with\nwholeWord = exactMode, matchCase forced off (keyword_opt \"01\" when on,\
    \ already supported by\ndb._kw_match), so the loose default path is unchanged;\
    \ the committed chip shows one\n\"Exact match\" badge. Markup hooks: templates/index.html\
    \ (header mark + dot) and\ntemplates/_feed.html (WHEN buttons wrapped in .segmented;\
    \ Exact toggle added to the\nkeyword group). Keyword input ids/classes consumed\
    \ elsewhere are unchanged.\n\n## Data Model Changes\n\n(none)\n\n## Supersede\
    \ / Versioning\n\n(none) — the Exact match toggle is a presentation change over\
    \ CR-260524-1315-001's two\nmutually-exclusive options; the underlying per-keyword\
    \ match flags and db._kw_match\nare unchanged, so no AC is superseded. The single-Exact-match-toggle\
    \ assertion lives in\nAC-260524-1500-003.\n\n## Scope Impact\n\nRe-skin plus a\
    \ keyword-control simplification (two option buttons → one Exact match\ntoggle).\
    \ Behaviour note: the UI no longer offers case-only or whole-only matching\nindependently\
    \ — Exact match bundles whole-word (case-insensitive), off is loose substring;\
    \ the backend\nstill supports every combination. No design system exists in this\
    \ project (single\nstyle.css with :root tokens), so the GR 14 §6.7 design-system\
    \ pre-flight steps are\nN/A; the §6.7 visual-confirmation gate still applies on\
    \ index.html. Reopens\nFT-260522-2050-002 and FT-260522-2230-001 (and EP-260512-2230-004\
    \ closure) until UAT\nre-passes the new AC. No data model, no API, no new matching\
    \ behaviour.\n"
