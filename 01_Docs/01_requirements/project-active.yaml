    # Project Charter — News Aggregator MVP

    > A personal multi-source news reader with a clean two-pane interface

    | | |
    |---|---|
    | **Project name** | News Aggregator |
    | **Document type** | Project Charter — MVP scope |
    | **Date** | 12 May 2026 |
    | **Status** | Draft v1.0 — pending validation |
    | **Estimated duration** | 3 to 4 weeks for MVP |

    ---

    ## 1. Context & motivation

    Existing news aggregators (Feedly, Inoreader, commercial readers) either come with subscription costs, limited customisation, or require trusting a third party with reading habits. The motivation for this project is to build a personal, self-hosted news aggregator that combines configurable web sources into a single, clean, distraction-free feed.

    The application starts with a simple promise: paste any news website URL, and the application figures out how to extract its latest articles, then merges everything into one chronological feed.

    ---

    ## 2. Objectives

    ### Primary objective

    Deliver a working MVP that lets a single user add news sources by URL, view a combined feed of recent articles, and click through to read them on the original site.

    ### Success criteria

    - The application can extract articles from at least 95% of mainstream news sites without manual configuration.
    - Adding a new source takes less than 30 seconds (paste URL, automatic feed discovery).
    - While the app is running, the feed updates automatically in the background every 15 to 30 minutes by default (interval configurable from 5 to 120 minutes). Closing the app pauses polling.
    - Running costs stay under 5 USD per month for personal use, even with optional AI features enabled.
    - The interface is fast: the default 50-article feed page loads in under 500 ms (with comfortable headroom up to 200 articles per page for users who increase the page size).

    ---

    ## 3. Scope

    ### In scope (MVP)

    - Add, remove, mute, and rename news sources via a simple UI. Each source row in the sidebar reveals a ⋮ action menu on hover with Rename, Mute / Unmute, and Remove. Renaming changes only the displayed label in the sidebar; the canonical URL / hostname used for polling and feed matching is unchanged. Muting hides a source from the combined feed but keeps polling in the background — its articles continue to be ingested and reappear instantly on unmute.
    - Automatic RSS/Atom feed discovery from any homepage URL.
    - Fallback to `sitemap.xml` and `news-sitemap.xml` when no RSS is found.
    - Background polling on a single user-configurable global refresh interval (default 20 min, range 5–120 min). All sources poll on the same cadence.
    - Two-pane interface: sources on the left, combined feed on the right. The feed is server-paginated (50 articles per page, newest first, with prev / next controls at the bottom). Sort is fixed to newest-first in MVP — no sort selector.
    - Header bar with the app title and a "last sync · N min ago" indicator; a manual refresh button in the feed header alongside background polling; an "All sources" virtual entry at the top of the sidebar acts as the default view, showing the combined feed and the total unread count.
    - Per-source colour coding (auto-assigned from a curated palette of ~12 distinguishable colours at source-add time; no user override in MVP) and unread counts (clicking an article marks it as read; no manual flip-back).
    - Open original articles in a new browser tab.

    ### Out of scope (deferred to later phases)

    - Multi-user support, accounts, or authentication.
    - Mobile applications (the web UI should be responsive, but no native apps).
    - Social features, sharing, or commenting.
    - Full-text search across history (Phase 2).
    - AI-generated summaries and topic clustering (Phase 3).
    - Paywalled content handling beyond detection and skipping.
    - Manual mark-as-unread — read state is one-way (click marks an article as read; no UI to flip it back).
    - Always-on / daemonised deployment (Raspberry Pi, VPS, Docker, systemd units) — deferred to Phase 4+; MVP runs only while the user has the app open on a local machine.
    - Multi-mode feed sort (by source, by relevance) — MVP ships newest-first only; the sort dropdown shown in the mockup is dropped.
    - Per-article tags / categories — the tag pills shown in the mockup (Economy, Tech, Markets, etc.) are out of scope for MVP. Categorisation is revisited in Phase 3 (AI-derived) if needed.

    ---

    ## 4. Technical approach

    ### Extraction strategy — waterfall

    To minimise both complexity and operational cost, the extraction pipeline applies progressively more expensive methods only when simpler ones fail:

    1. **RSS/Atom feed discovery.** Scan the HTML head for alternate links. Try common paths (`/feed`, `/rss`, `/atom.xml`) as fallback. *Free.*
    2. **Sitemap fallback.** Parse `sitemap.xml` or `news-sitemap.xml` when no feed is found. *Free.*
    3. **Structured metadata.** Extract Open Graph and JSON-LD `NewsArticle` schema from article pages. *Free.*
    4. **Readability extraction.** Use Trafilatura or Mozilla Readability for article body extraction. *Free.*
    5. **AI fallback (Phase 3 only).** Call Claude Haiku on pre-cleaned HTML for the few stubborn sites that resist the above. *Estimated cost: well under 1 USD per month for typical use.*

    ### Stack proposal

    - **Backend:** Python 3.11+ with FastAPI for a small HTTP API.
    - **Feed parsing:** `feedparser` library for RSS/Atom.
    - **Article extraction:** Trafilatura for clean text extraction.
    - **Storage:** SQLite with a single `articles` table, indexed by URL and published date.
    - **Scheduling:** APScheduler for background polling jobs.
    - **Frontend:** server-rendered Jinja2 templates served directly by FastAPI. No build step, no bundler, no SPA framework. Light vanilla JS / HTMX-style partials for the interactive bits (source-add, refresh, mark-as-read).
    - **Optional:** Playwright for JavaScript-heavy sites, used only when static fetch fails.

    ### AI integration philosophy

    AI is treated as an optional enhancement, not a foundation. The MVP runs entirely without AI calls. AI features are introduced in Phase 3 where they provide clear value (summarisation, classification, cross-source analysis) and always after cleaning the input to keep token costs minimal.

    ---

    ## 5. Key deliverables

    - Functional backend API (add source, list articles, refresh).
    - Frontend web interface matching the validated mockup design.
    - SQLite database schema and migration scripts.
    - Background polling service.

    ---

    ## 6. Timeline

    | Phase | Duration | Deliverables |
    |---|---|---|
    | **Phase 1** | Week 1 | Backend foundations: RSS discovery, feedparser integration, SQLite schema, background polling, basic `/sources` and `/articles` endpoints. |
    | **Phase 2** | Week 2 | Frontend MVP: two-pane interface, source management, combined feed view, article click-through to original site. |
    | **Phase 3** | Week 3 | Polish: per-source filtering, mute toggles, read/unread state, responsive layout, error handling, deployment setup. |
    | **Phase 4** | Week 4 *(optional)* | AI enhancements: on-demand summaries via Claude Haiku, daily digest, basic topic tagging. |

    ---

    ## 7. Risks & mitigations

    ### Sites without RSS or sitemap

    A small percentage of modern news sites publish no RSS feed and no public sitemap.

    **Mitigation:** fall back to JSON-LD and Open Graph extraction, which covers most cases. For the residual, AI-assisted extraction in Phase 4 is the safety net.

    ### Rate limiting and being blocked

    Aggressive polling can get the application blocked or rate-limited.

    **Mitigation:** respect `robots.txt`, set a polite User-Agent identifying the application, limit to one request per 2 seconds per domain, and cache aggressively to avoid redundant fetches.

    ### Paywalled content

    Some sources hide content behind paywalls.

    **Mitigation:** detect paywall patterns (common selectors, content truncation indicators) and store metadata only, with a clear visual cue in the feed. The application is not designed to bypass paywalls.

    ### Scope creep

    News aggregators are easy to over-engineer with features like tagging, smart folders, AI summarisation, and so on.

    **Mitigation:** ship the MVP first with strict scope, validate the core experience, then add features based on actual personal usage rather than imagined needs.

    ---

    ## 8. Resources & estimated costs

    - **Development:** one developer, part-time, 3 to 4 weeks for MVP.
    - **Hosting (MVP):** runs on a single local machine (developer laptop or workstation). The app polls only while open; closing the app pauses polling. Always-on deployment (RPi, VPS, Docker) is out of scope for MVP and deferred to Phase 4+.
    - **Database:** SQLite, no licensing cost.
    - **AI API budget (Phase 4 only):** 1 to 5 USD per month with Claude Haiku and aggressive caching.
    - **Total estimated running cost:** under 5 USD per month at the high end — no hosting cost in the MVP (local machine only); only the optional Phase 4 AI budget contributes.

    # Mockup
    [mockup](01_docs/04_content/html/mockup.html)
    ---

    ## 9. Next steps

    - [ ] Review and validate this charter.
    - [ ] Confirm remaining technology choices (feedparser, Trafilatura, APScheduler, SQLite — frontend stack already locked to Jinja2 + FastAPI).
    - [ ] Set up the project repository and base scaffolding.
    - [ ] Begin Phase 1 — backend foundations.

    ---

    *End of document*
