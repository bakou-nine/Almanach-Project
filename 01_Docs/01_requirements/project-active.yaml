        # FT03 — Source List & Sidebar Rendering

        ## Wireframes

        See 04_content/html/mockup.html lines 343–403 (sidebar). §5.1.2
        design will expand to include the muted state explicitly.

        ---

        ## Body

        The left pane. Width 260 px, background `--bg-secondary`. Header
        section with "SOURCES" label and the `+` add button (which
        triggers FT01).

        Source rows (top to bottom) when no Groups exist (flat-list
        mode, this FT's contract):

        - "All sources" virtual entry at the very top: stack icon + label
          "All sources" + unread-count pill showing the SUM of every
          source's unread count. Always rendered, regardless of how many
          sources exist. Clicking it sets the feed filter to "combined"
          (default).
        - 8 px gap below the virtual entry.
        - Each real Source as a row: colour dot (the source's assigned
          palette colour) + display name (with text-ellipsis for overflow)
          + unread-count pill (right-aligned).
        - Active state (one source clicked / selected): white background,
          left border in `--text-info` colour. Filter the feed pane to
          that source.
        - Muted state (per FT04's mute toggle): opacity ~0.5, name with
          strikethrough, eye-off icon in place of the unread-count pill.
          Clicking a muted row is allowed but does nothing (only FT04's
          ⋮ menu can unmute).

        When at least one Group exists, the tree layout from FT05 takes
        over the source-list block (see FT-260522-2115-001 body for the
        full tree contract). This FT remains the owner of the flat
        fallback and of the "All sources" virtual entry; FT05 layers on
        top via US-260522-2116-003.

        Footer: thin separator + "Updated N min ago" indicator (sourced
        from EP04's header-bar last-sync timestamp).

        Server-rendered on every page load. HTMX-style partial refresh
        on source add / remove / mute / rename (FT01 and FT04 dispatch
        a sidebar refresh, no full page reload). FT05 additionally
        triggers refresh on every Group / Subgroup CRUD or drag-drop
        write.

        **Out of scope:**

        - Drag-to-reorder source rows (not in MVP).
        - Search-within-sidebar (not in MVP).
        - The ⋮ action menu itself (see FT04).
        - Feed pane rendering (see EP04).
        - Group / Subgroup tree rendering — owned by FT05
          (FT-260522-2115-001).

        **Reference documents:**

        - UI_SPEC.md §Sidebar (to be authored).
        - 04_content/html/mockup.html (lines 343–403 — flat-list).
        - FT-260522-2115-001 (grouping tree layout that wraps this FT).

