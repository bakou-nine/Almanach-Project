      body: "# FT02 — Feed Discovery Waterfall\n\n## Wireframes\n\n(Backend service\
        \ — no UI surface. Error reasons surfaced via FT01.)\n\n---\n\n## Body\n\n\
        A pure backend service. Input: a homepage URL (e.g. `https://lemonde.fr`).\n\
        Output on success: `{ feed_url, method: \"alternate_link\" | \"common_path\"\
        \n| \"sitemap\" }`. Output on failure: `{ error: \"no_alternate_link\" |\n\
        \"all_common_paths_404\" | \"no_sitemap\" | \"sitemap_unparsable\" |\n\"fetch_error\"\
        , details }`.\n\nWaterfall order:\n\n1. **HTML head scan.** GET the homepage\
        \ with a 5 s timeout. Parse the\n   HTML head for `<link rel=\"alternate\"\
        \ type=\"application/rss+xml\"`\n   or `type=\"application/atom+xml\"`. If\
        \ found, return its `href`\n   (resolved to absolute URL).\n2. **Common-path\
        \ probe.** For each of `/feed`, `/rss`, `/atom.xml`\n   (in that order), HEAD-request\
        \ with a 2 s timeout. If any returns\n   200 with a feed-shaped Content-Type\
        \ (`application/rss+xml`,\n   `application/atom+xml`, `application/xml`, `text/xml`),\
        \ return it.\n3. **Sitemap fallback.** GET `/sitemap.xml` then `/news-sitemap.xml`\n\
        \   (each with a 3 s timeout). Parse XML. If parseable, return a marker\n\
        \   indicating sitemap-based ingestion — EP02 features handle the\n   periodic\
        \ parse.\n\nTotal wall-clock budget per call: ≤ 10 s (short-circuit on first\n\
        success).\n\nMulti-feed selection: when step 1 finds multiple `<link rel=\"\
        alternate\">`\nentries, MVP picks the first by RSS > Atom priority.\n\n**Out\
        \ of scope:**\n\n- Article fetching / parsing (see EP02 features).\n- AI-assisted\
        \ discovery (Phase 4+).\n- JavaScript-rendered sites (Playwright path deferred\
        \ per EP02).\n- User-facing UI (FT01 owns the form; FT02 has no UI).\n\n**Reference\
        \ documents:**\n\n- DATA_MODEL.md §Source.feed_url, §Source.discovery_method\
