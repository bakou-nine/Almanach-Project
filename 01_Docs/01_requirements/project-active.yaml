      # EP — Data Portability

      ## Feature Navigation Flows

      | Flow | Feature | Entry point |
      | :--- | :--- | :--- |
      | FL1 | FT — Library Export | Settings → Export library |
      | FL2 | FT — Library Import & Review | Header → Review proposed (N) |
      | FL3 | FT — Excel Source Hierarchy Import/Export | Header → Sources data |

      ---

      ## Body

      Move the source library (folders + sources + ratings) in and out as a single
      versioned YAML (`almanach-portability/v1`), mirroring the Filum DB↔YAML sync
      mechanism: export writes the file + sync flag; a live watcher ingests on
      `status: import` into a staging zone; the user approves/adjusts in a Review
      screen before anything goes live. First-run seeding loads the bundled default
      library through the same staged path.

      **Key functional areas:**

      - Export: live DB → `almanach-library.yaml` + `almanach-sync.yaml` flag.
      - Import: watchdog on the sync file → staged ingest (never writes live tables).
      - Review & approve: per-item accept/reject, with rating adjustment.
      - First-run seed: bundled `default_library.yaml` when the DB is empty.
      - Excel export / blank template / replace-import via the header Sources data menu — no staging by design (FT-260704-1845-001, DATA_MODEL.md §12).

      **Out of scope:**

      - Article ("news store") import/export — deferred to schema `v2`.
      - Cross-app formats (OPML) — portability = YAML `v1` + the Excel hierarchy file (§12) only.
      - Conflict auto-merge beyond add/modify/remove staging.

      **Reference documents:**

      - DATA_MODEL.md §9 (portability), §10 (sync control), §11 (staging), §12 (Excel hierarchy import/export).
      - CLAUDE.md §A1 (ALMANACH source-curation process).
