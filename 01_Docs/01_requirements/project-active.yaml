  body: '# CR — Left-pane title click scopes right-pane feed to its sources


    ## Change Summary

    Second half of the split from CR-260523-1428-001 (item 2 of its body). Clicking
    a Group title or Subgroup title in the sidebar (left pane) scopes the right-pane
    feed to articles whose source belongs to that Group or Subgroup. The selected
    title is visually marked active; clicking the active selection (or "All sources")
    clears the scope. The scope coexists with the filter bar introduced by sibling
    CR-260523-1500-001 — both predicates apply together when set (cross-CR integration
    is asserted by AC-260523-1501-004, multi-FULFILLS-linked to both CRs per §3.4).


    This CR extends an existing interactive surface (the sidebar tree click affordance,
    today limited to Source rows) to Group and Subgroup title rows. The new behaviour
    is asserted by new AC objects rather than amendments to the existing source-row
    click AC.


    ---


    ## Affected Requirement Objects

    | ID — Title | Action | Status transition |

    | :--- | :--- | :--- |

    | `US-260522-2230-003` — Continuous-Scroll Feed | modified (feed query honours
    active sidebar scope when a Group/Subgroup is selected) | CLOSED → OPEN (on CR
    promotion per §5.2.2) |


    The sidebar Group/Subgroup feature owning the row affordance (likely under EP-260512-2230-001
    Source Management — candidate FT to confirm during §5.2.4 entry) will be added
    to this table once §5.2.4 step 1 input read resolves the exact host requirement.


    ## Design Changes

    None new. Reuses the existing sidebar tree from the Source Management epic. Active-state
    visual treatment of Group/Subgroup rows follows the existing source-row active-state
    convention (no additional wireframe required).


    ## Data Model Changes

    No schema changes. Selection state is client-side; the predicate composes with
    existing `Article.source_id` / `Source.group_id` / `Source.subgroup_id` columns.


    ## Supersede / Versioning

    SUPERSEDES → CR-260523-1428-001 (paired with sibling CR-260523-1500-001).


    ## Scope Impact Assessment

    - **Features affected:** US-260522-2230-003 (Continuous-Scroll Feed) — feed query
    honours sidebar scope; sidebar Group/Subgroup feature — click affordance extended.

    - **Features blocked:** none.

    - **Features unblocked:** none.

    - **Regression risk:** low — additive click affordance; existing source-row click
    contract unchanged.

    - **Breaking changes:** none.


    ---

    '
