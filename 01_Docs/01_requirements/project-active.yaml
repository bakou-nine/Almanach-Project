  body: |
    Hosts the sidebar-as-feed-scope behaviour introduced by CR-260523-1501-001 —
    sibling story under FT-260522-2230-001. Clicking a Group / Subgroup title (distinct
    from the existing chevron expand / collapse) sets it as the active feed scope; the
    feed re-renders to articles whose source belongs to the title directly or via a
    descendant. Only one scope is active at a time — shared single-active-row contract
    with the source-row click (FT-260512-2245-003). Clicking the active title again,
    or All sources, clears it. An empty scope shows a scope-named empty state. Composes
    (AND) with the filter bar (US-260523-1906-001); cross-integration asserted at
    feature level by AC-260523-1501-004.

    **Data model fields touched:**

    - `Source.group_id`, `Source.subgroup_id`, `Article.source_id` (read — scope predicate)

    **Spec reference:** CR-260523-1501-001 §Change Summary; existing sidebar tree
    (FT-260522-2115-001) + feed (US-260522-2230-003). No new wireframe — reuses the
    source-row active-state convention.
