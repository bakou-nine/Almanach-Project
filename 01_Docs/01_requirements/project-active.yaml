      tags: []
      body: "# FT03 — Source List & Sidebar Rendering\n\n## Wireframes\n\nSee 04_content/html/mockup.html\
        \ lines 343–403 (sidebar). §5.1.2 design\nwill expand to include the muted\
        \ state explicitly.\n\n---\n\n## Body\n\nThe left pane. Width 260 px, background\
        \ `--bg-secondary`. Header\nsection with \"SOURCES\" label and the `+` add\
        \ button (which triggers\nFT01).\n\nSource rows (top to bottom):\n\n- \"All\
        \ sources\" virtual entry at the very top: stack icon + label\n  \"All sources\"\
        \ + unread-count pill showing the SUM of every source's\n  unread count. Always\
        \ rendered, regardless of how many sources\n  exist. Clicking it sets the\
        \ feed filter to \"combined\" (default).\n- 8 px gap below the virtual entry.\n\
        - Each real Source as a row: colour dot (the source's assigned\n  palette\
        \ colour) + display name (with text-ellipsis for overflow) +\n  unread-count\
        \ pill (right-aligned).\n- Active state (one source clicked / selected): white\
        \ background,\n  left border in `--text-info` colour. Filter the feed pane\
        \ to that\n  source.\n- Muted state (per FT04's mute toggle): opacity ~0.5,\
        \ name with\n  strikethrough, eye-off icon in place of the unread-count pill.\n\
        \  Clicking a muted row is allowed but does nothing (only FT04's ⋮\n  menu\
        \ can unmute).\n\nFooter: thin separator + \"Updated N min ago\" indicator\
        \ (sourced from\nEP04's header-bar last-sync timestamp).\n\nServer-rendered\
        \ on every page load. HTMX-style partial refresh on\nsource add / remove /\
        \ mute / rename (FT01 and FT04 dispatch a sidebar\nrefresh, no full page reload).\n\
        \n**Out of scope:**\n\n- Drag-to-reorder source rows (not in MVP).\n- Source\
        \ grouping / folders (not in MVP).\n- Search-within-sidebar (not in MVP).\n\
        - The ⋮ action menu itself (see FT04).\n- Feed pane rendering (see EP04).\n\
        \n**Reference documents:**\n\n- UI_SPEC.md §Sidebar (to be authored).\n- 04_content/html/mockup.html\
        \ (lines 343–403).\n\n---\n"
      acceptance_criteria: null
