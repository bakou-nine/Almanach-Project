    updated_at: '2026-05-12T22:19:11.790585'
    updated_by: CLAUDE_CODE
    approved_by_human: true
    cancellation_reason: null
    tags: []
    body: "# EP03 — Background Polling\n\n## Feature Navigation Flows\n\n(Features\
      \ pending — next §5.1.1 round.)\n\n---\n\n## Body\n\nThe scheduler that wakes\
      \ every N minutes (5–120, default 20), iterates the\nsource list, and triggers\
      \ the EP02 ingestion path for each non-paused\nsource. Polite-fetcher rules\
      \ enforce 1 request per 2 s per domain, respect\nrobots.txt, and send a polite\
      \ User-Agent. Runs only while the app process\nis up (no daemon; charter §3\
      \ out-of-scope).\n\n**Key functional areas:**\n\n- APScheduler integration and\
      \ lifecycle (start on boot, stop on shutdown).\n- Global polling interval setting\
      \ (5–120 min, default 20).\n- Per-source poll-state tracking (last_polled_at,\
      \ last_error, consecutive\n  failure count).\n- Polite-fetcher rules: robots.txt\
      \ honouring, custom User-Agent, 1 req /\n  2 s / domain throttle.\n- Manual\
      \ refresh trigger wired from the EP04 header refresh button.\n\n**Out of scope:**\n\
      \n- Per-source interval override (charter §3 — global only).\n- Smart cadence\
      \ auto-detection from publish history (Phase 4+).\n- Always-on / daemonised\
      \ polling (charter §3 — Phase 4+).\n- Feed parsing logic (see EP02).\n\n**Reference\
      \ documents:**\n\n- DATA_MODEL.md §Source.last_polled_at, §Source.last_error\
      \ (to be authored).\n- AUDIT_MODEL.md §PollEvent (to be authored).\n\n---\n"
    acceptance_criteria: null
    relations: []
    features: []
