    cancellation_reason: null
    tags: []
    body: "# EP04 — Feed Reading Experience\n\n## Feature Navigation Flows\n\n(Features\
      \ pending — next §5.1.1 round.)\n\n---\n\n## Body\n\nThe reader UI. Two panes:\
      \ sidebar (sources + \"All sources\" virtual entry +\nunread counts + auto colours)\
      \ on the left, paginated combined feed on the\nright (50 / page, newest-first,\
      \ prev / next at bottom). Header bar above\nboth panes shows app title plus\
      \ \"last sync · N min ago\" and a manual\nrefresh button. Clicking an article\
      \ opens it in a new browser tab and\nmarks it as read (one-way; charter §3 out-of-scope).\n\
      \n**Key functional areas:**\n\n- Two-pane layout template + responsive breakpoint\
      \ at 720px.\n- Sidebar rendering: source rows, active state, muted state visual,\n\
      \  unread-count pills, \"All sources\" virtual entry at top.\n- Feed pagination\
      \ (50 / page, newest-first, prev / next).\n- Article row layout: full (with\
      \ summary) above the fold, compact\n  (one-liner) below — exact breakpoint deferred\
      \ to §5.1.2 design.\n- Click-to-read: open new tab, write read_at on Article.\n\
      - Header bar: app title + last-sync indicator + manual refresh button\n  (wires\
      \ to EP03 manual refresh).\n\n**Out of scope:**\n\n- Multi-mode feed sort (charter\
      \ §3 — newest-first only).\n- Per-article tag pills (charter §3 out-of-scope).\n\
      - Manual mark-as-unread (charter §3 — read state is one-way).\n- Native mobile\
      \ apps (responsive web only).\n- Source CRUD (see EP01).\n- Article ingestion\
      \ / storage (see EP02).\n\n**Reference documents:**\n\n- UI_SPEC.md §TwoPaneLayout,\
      \ §Sidebar, §Feed, §Header (to be authored).\n- 04_content/html/mockup.html\
      \ (whole-screen reference).\n\n---\n"
    acceptance_criteria: null
    relations: []
    features: []
