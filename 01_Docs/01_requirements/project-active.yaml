        story_statement: As a user, I want a refresh button in the header that visibly enters a loading state on click and signals when the refresh completes (success or failure), so that I know whether my action took effect and when it finished.
        tags: []
        body: |
          Header-bar refresh button + click handler + completion signal surface. Click → button enters loading state (spinner / disabled / animated icon) → backend `POST /refresh` triggers a synchronous poll cycle (same EP02 ingestion path as the scheduled cycle in US-260522-2050-001) → on completion, button exits loading state AND at least one of: a toast appears, a transient success/error state shows on the button, OR the header last-sync indicator (US-260522-2050-003) re-renders to the new timestamp.

          Failure path: on backend 5xx / network failure, the button shows a transient error state AND a toast surfaces the failure reason. The button is re-enabled so the user can retry.

          Button is disabled while a refresh is in flight to prevent double-clicks producing concurrent poll cycles.

          **Data model fields touched:**

          - `Source.last_polled_at` (write, via the poll cycle dispatched by the endpoint) — updated on successful per-source poll.
