      body: |
        # FT02 — Feed Discovery Waterfall

        ## Wireframes

        (Backend service — no UI surface. Error reasons surfaced via FT01.)

        ---

        ## Body

        A pure backend service. Input: a homepage URL (e.g. `https://lemonde.fr`).
        Output on success: `{ feed_url, method: "alternate_link" | "common_path"
        | "sitemap" }`. Output on failure: `{ error: "no_alternate_link" |
        "all_common_paths_404" | "no_sitemap" | "sitemap_unparsable" |
        "fetch_error", details }`.

        Waterfall order:

        1. **HTML head scan.** GET the homepage with a 5 s timeout. Parse the
           HTML head for `<link rel="alternate" type="application/rss+xml"`
           or `type="application/atom+xml"`. If found, return its `href`
           (resolved to absolute URL).
        2. **Common-path probe.** For each of `/feed`, `/rss`, `/atom.xml`
           (in that order), HEAD-request with a 2 s timeout. If any returns
           200 with a feed-shaped Content-Type (`application/rss+xml`,
           `application/atom+xml`, `application/xml`, `text/xml`), return it.
        3. **Sitemap fallback.** GET `/sitemap.xml` then `/news-sitemap.xml`
           (each with a 3 s timeout). Parse XML. If parseable, return a marker
           indicating sitemap-based ingestion — EP02 features handle the
           periodic parse.

        Total wall-clock budget per call: ≤ 10 s (short-circuit on first
        success).

        Multi-feed selection: when step 1 finds multiple `<link rel="alternate">`
        entries, MVP picks the first by RSS > Atom priority.

        **Out of scope:**

        - Article fetching / parsing (see EP02 features).
        - AI-assisted discovery (Phase 4+).
        - JavaScript-rendered sites (Playwright path deferred per EP02).
        - User-facing UI (FT01 owns the form; FT02 has no UI).

        **Reference documents:**

        - DATA_MODEL.md §Source.feed_url, §Source.discovery_method (to be
          authored).

