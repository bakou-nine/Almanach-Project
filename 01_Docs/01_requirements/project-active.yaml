  body: '## Description

    Content-selection filter — multi-select dropdown. Mirrors the sidebar tree (Group
    → Subgroup → Source). Each row has a toggle affordance; clicking selects (checked
    visual state), clicking again deselects. Selecting a Group or Subgroup row implicitly
    includes every Source beneath it. The dropdown stays open across multiple toggles
    so the user can build a multi-select in one gesture; it closes on click-outside
    or via an explicit Done affordance. Selection state persists when the dropdown
    is re-opened.


    ## Test Instructions


    1. Open the content-selection dropdown.

    2. Verify the list is rendered as Group → Subgroup → Source rows in sidebar order.

    3. Click a Source row. Verify it enters a selected (checked) visual state and
    the dropdown stays open.

    4. Click two more Source rows. Verify all three are now selected and the dropdown
    is still open.

    5. Click one of the selected rows. Verify it deselects (and the other two stay
    selected).

    6. Click outside the dropdown. Verify the dropdown closes and the feed re-renders
    to show only articles from the selected sources.

    7. Re-open the dropdown. Verify the prior selection state is preserved.

    8. Select a Group row containing multiple Sources. Verify every Source beneath
    the Group is implicitly included in the feed predicate (the feed shows articles
    from all of them).

    '
