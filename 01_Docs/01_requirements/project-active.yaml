  body: '# CR — Feed filters: date range + multi-select content selection


    ## Change Summary

    First half of the split from CR-260523-1428-001 (the original "Filter" CR; item
    1 of its body). Adds a filter bar at the top of the right-pane feed that lets
    the user constrain visible articles by (a) a date range — either an explicit start/end
    (max 1-year span) or shortcut chips (1d / 1w / 1m) — and/or (b) a cumulative multi-select
    of titles (Groups / Subgroups) and individual news sources. Multiple filters compose
    (logical AND). The filter bar lives in the right pane but its predicate is applied
    to the article query, so the rendered feed reflects only matching articles. Item
    2 of the original CR (left-pane title click scopes the right pane) is handled
    by sibling CR-260523-1501-001.


    This CR introduces NEW behaviour the feed feature does not currently assert —
    see §3.4 dedup rule: AC are new objects, not extensions of existing AC.


    ---


    ## Affected Requirement Objects

    | ID — Title | Action | Status transition |

    | :--- | :--- | :--- |

    | `FT-260522-2230-001` — Continuous-Scroll Feed | modified (filter-aware feed
    query) | CLOSED → OPEN (on CR promotion per §5.2.2) |

    | `US-260522-2230-003` — Continuous-Scroll Feed | modified (extends `/feed-partial`
    with optional `from` / `to` / `group_ids` / `subgroup_ids` / `source_ids` query
    params; client-side filter bar UI) | CLOSED → OPEN (on CR promotion per §5.2.2)
    |


    A new sibling US under FT-260522-2230-001 dedicated to the filter-bar UI may be
    proposed during §5.2.4 step 4 if extending US-260522-2230-003 would push it past
    §3.6 overload thresholds.


    ## Design Changes

    New wireframe required under `01_Docs/03_design/01_wireframes/feature level/`
    showing the filter bar default state + open content-selection dropdown (Group
    → Subgroup → Source tree) + active-filter chip states. To be authored in a §5.1.2
    design pass on this CR before §5.2.4 dev entry. Existing reference image: `01_Docs/04_content/images/news
    to be displayed in the selected title only.png` (provided by user; primarily illustrates
    item 2, but constrains the right-pane behaviour this CR also shapes).


    ## Data Model Changes

    No schema changes. Filter predicate is applied at query time over existing `Article.published_at`,
    `Article.source_id`, `Source.group_id`, `Source.subgroup_id`. DATA_MODEL.md §3
    (`idx_article_published_at`) already supports the date-range cursor query path.


    ## Supersede / Versioning

    SUPERSEDES → CR-260523-1428-001 (paired with sibling CR-260523-1501-001 — both
    new CRs supersede the original; the original is split into these two because §3.6.2
    placement check flagged it as bundling two distinct functionalities under one
    CR).


    ## Scope Impact Assessment

    - **Features affected:** FT-260522-2230-001 (Continuous-Scroll Feed) — feed query
    gains filter parameters and the right pane gains the filter-bar surface.

    - **Features blocked:** none.

    - **Features unblocked:** none.

    - **Regression risk:** medium — the feed query is on the hot path. Existing CLOSED
    AC under FT-260522-2230-001 and US-260522-2230-003 (unfiltered feed behaviour)
    must continue to pass when no filter is active.

    - **Breaking changes:** none (filter params are additive and optional on `/feed-partial`).


    ---

    '
