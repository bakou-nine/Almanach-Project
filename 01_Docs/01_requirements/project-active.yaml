        story_statement: As a frontend component (FT01 US04, I want a sidebar-partial
          endpoint that re-renders only the source-list block, so that I can HTMX-swap
          it without forcing a full-page reload.
        tags: []
        body: "Backend route `GET /sidebar-partial` that returns the HTML\nfragment\
          \ for the source-list block of the sidebar — same\ncontent as US-260513-0010-001\
          \ produces, but WITHOUT the\nsurrounding header / footer (just the rows\
          \ including the\n\"All sources\" virtual entry). The fragment is suitable\
          \ for\nHTMX outer-HTML swap into the source-list container.\n\nRecomputes\
          \ on each call (no caching beyond the single request)\nso that state changes\
          \ from polling (new article counts),\nsource CRUD (FT01 add, FT04 rename\
          \ / mute / remove), and\nread-state writes (EP04 click-to-read) are reflected\n\
          immediately.\n\nCallers:\n\n- FT01 `US-260512-2300-004` after a successful\
          \ source add.\n- FT04 (all three actions: rename, mute / unmute, remove).\n\
          - EP03 poll completion if any Source's unread count changed.\n\n**Data model\
          \ fields touched:**\n\n- `Source.colour`, `Source.display_name`, `Source.muted`,\n\
          \  `Source.id` (read).\n- `Article.read_at`, `Article.source_id` (read)\
          \ for the\n  unread-count aggregation.\n\n**Spec reference:** UI_SPEC.md\
          \ §Sidebar (rendering identical to\nUS-260513-0010-001 minus chrome — to\
          \ be authored);\nDATA_MODEL.md §1.1 Source, §1.2 Article, §3\n(`idx_article_read_at_null`).\n"
