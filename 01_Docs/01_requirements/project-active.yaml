  body: |
    # BUG — Save-to-project entry point moves from article title to the row ⋮ menu

    ## Defect Summary

    Clicking an article's title opens the save-to-project popover (app.js
    onArticleClick title trigger, FT-260704-1620-001 handoff screen 5) instead of
    opening the article — it hijacks the charter/EP04 click-to-read contract and
    ruins UX. Expected (user report + screenshot): the popover opens from the
    article row ⋮ menu (bookmark button stays); the title opens the article; both
    adding and removing a project assignment are reachable from the ⋮ menu.
    ![screenshot_20260704_182815](01_docs/04_content/images/screenshot_20260704_182815.png)

    ---

    ## Affected Requirements (CONFIRMS targets)

    - `US-260704-1620-003` — Save-to-project popover from bookmark and row ⋮ menu
    — failing AC: AC-260704-1620-009, AC-260704-1850-001

    ---

    ## Technical Approach

    **Files / functions to change:**

    - `02_code/almanach/static/js/app.js` — onArticleClick (drop .article-title
    trigger), applyMenuContextItems (article-only menu item), handleRowAction
    (save-project action), save-menu outside-mousedown guard

    - `02_code/almanach/templates/_row_menu.html` — article-only "Save to project"
    item

    - `02_code/almanach/templates/_feed_rows.html` — trigger comment

    **Root cause:**

    The handoff prototype's title-click trigger was implemented verbatim; it
    conflicts with the higher-ranked click-to-read behaviour (GR 7 — charter/EP04
    wins). US-260704-1620-003 / FT-260704-1620-001 / AC-260704-1620-009 texts
    corrected downward in this cycle.

    **Fix outline:**

    Remove .article-title from the popover trigger and its dismissal guard so
    title clicks fall through to open-article; add an article-only "Save to
    project" item to the row ⋮ menu opening the same popover (checkbox toggle =
    add/remove assignment); bookmark button unchanged.
