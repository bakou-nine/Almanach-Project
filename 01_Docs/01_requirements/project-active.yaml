    # CR — Private-address rejection in source add / discovery

    ## Change Summary

    The 2026-07-04 review found the unauthenticated add/discovery pipeline follows
    redirects and probes arbitrary URLs with no restriction on loopback, private,
    or link-local ranges (urls.py is_valid_http_url checks scheme+host only;
    discovery follows harvested links), making the app usable as a local request
    proxy. New behaviour: server-side guard rejects such targets (including
    post-redirect) with the existing inline add-error surface.

    ---

