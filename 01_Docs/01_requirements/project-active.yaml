        # FT — Excel Source Hierarchy Import/Export

        ## Wireframes

        High-fidelity handoff (menu + toast chrome, tokens): 01_Docs/03_design/02_claude design handoffs/import  export news provider via xml (README.md view 8). On-disk format is .xlsx, not the prototype's XML (user decision, this CR).

        ---

        ## Body

        Header **Sources data** button opens a popover menu (dismiss on outside mousedown / Escape) with two sections. Export — *Export current sources* (downloads `almanach-sources-<YYYY-MM-DD>.xlsx`, one row per source in display order) and *Download blank template* (`almanach-sources-template.xlsx`: header row + worked example rows + a "How to use" sheet). Import — *Upload Excel file* (file picker; the .xlsx bytes are POSTed and **replace the whole folder tree + source list immediately, no confirmation** — the documented exception to the §11 two-zone safeguard, which stays mandatory for the YAML sync path of FT-260525-1200-002). Every outcome surfaces in the global toast.

        Columns + replace semantics: DATA_MODEL.md §12. The hierarchy lives in a single **Folder** column as a `/`-separated path (`AI / Generalist-Daily`; blank = ungrouped); row order = display order. Sources are keyed by **URL**: a matched URL updates its row in place (articles + read state survive a round-trip); a URL live but absent from the sheet is deleted (articles cascade); a new row needs a URL. Forgiving parse (header-name column mapping, palette colour default, invalid ratings → medium, name defaults to the URL host). Single transaction — an invalid workbook changes nothing.

        **Out of scope:**

        - Formats other than .xlsx (XML / CSV / OPML).
        - Per-item merge / confirmation UI (replace is all-or-nothing by design).
        - Discovery dispatch on import (`Feed URL` taken as-is; a missing feed may poll with errors until corrected).
        - A stable id column — identity is the URL; changing a URL makes a new provider.

        **Reference documents:**

        - DATA_MODEL.md §12 (columns, folder-path mapping, replace semantics).
        - 01_Docs/03_design/02_claude design handoffs/import  export news provider via xml/README.md (view 8 — menu/toast UI + tokens).

        ---
