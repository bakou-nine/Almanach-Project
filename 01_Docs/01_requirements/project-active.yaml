  body: |
    # BUG — Synchronous network I/O blocks the event loop

    ## Defect Summary

    POST /sources runs the full discovery waterfall (10 s wall-clock budget, discovery.py DISCOVERY_TOTAL_BUDGET_S) plus a second sync feed fetch (_resolve_display_name) directly inside the async route (app.py:309/320) — while one user adds a source every other request stalls. The first-run seeder (_seed_if_empty, app.py:895-924) discovers 10 seed sources sequentially inside lifespan startup, blocking the server before it accepts any request. Each queued manual /refresh holds an anyio threadpool worker for a full poll cycle behind _manual_poll_lock (scheduler.py:87-96). Expected: the UI stays responsive during add/seed/refresh; observed: whole-app freezes.

    ---

    ## Affected Requirements (CONFIRMS targets)

    - `US-260512-2300-003` — Discovery Dispatch & Source Persistence — failing AC: AC-260704-0735-001
    - `US-260522-2050-004` — Manual Refresh Button — failing AC: AC-260704-0735-002
    - `US-260525-1200-002` — First-run seed loads the bundled default library — failing AC: AC-260704-0735-003

    ---

    ## Technical Approach

    **Files / functions to change:**
    - `02_code/almanach/app.py` — create_source (discovery.discover + _resolve_display_name on the loop), _seed_if_empty / lifespan
    - `02_code/almanach/scheduler.py` — run_manual_poll_blocking

    **Root cause:**
    Sync httpx calls invoked directly in async def routes and in lifespan; the run_in_threadpool pattern already used by /refresh and /export (app.py:734/762) was not applied to the slowest endpoint or to startup seeding.

    **Fix outline:**
    Wrap discovery + display-name resolution in run_in_threadpool; move first-run seeding to a background task after startup so the server accepts requests immediately; make /refresh return an "already running" response instead of queueing workers on the lock.
