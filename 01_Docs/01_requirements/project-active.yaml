    # BUG — Systemic unhandled promise rejections in async UI paths

    ## Defect Summary

    api() throws on !resp.ok but many call sites are fire-and-forget: applyFilterChange (app.js:1964) fires refreshFeed()+refreshSidebar() uncaught; selectSidebarBranch (app.js:306) is unawaited; loadMoreFeed's catch (app.js:236-238) is deliberately empty so infinite scroll stops with no signal; refreshFeed/refreshSidebar themselves have no try/catch. When the server errors or the network blips, the UI silently shows stale content with no feedback.

    ---

    ## Affected Requirements (CONFIRMS targets)

    - `US-260522-2050-004` — Manual Refresh Button — failing AC: AC-260704-0735-009
    - `US-260522-2230-003` — Continuous-Scroll Feed — failing AC: AC-260704-0735-010

    ---

    ## Technical Approach

    **Files / functions to change:**
    - `02_code/almanach/static/js/app.js` — refreshFeed, refreshSidebar, applyFilterChange, selectSidebarBranch, loadMoreFeed, setSourceRating, onArticleClick

    **Root cause:**
    Async call sites discard promises without catch handlers; one catch block is intentionally empty.

    **Fix outline:**
    Route refreshFeed/refreshSidebar failures through the existing toast component with a retained-UI fallback; await or .catch every fire-and-forget call site; surface a retry affordance when a scroll batch fails.
