    updated_by: CLAUDE_CODE
    approved_by_human: true
    cancellation_reason: null
    tags: []
    body: "# EP02 — Article Ingestion & Storage\n\n## Feature Navigation Flows\n\n\
      (Features pending — next §5.1.1 round.)\n\n---\n\n## Body\n\nTurns a polled\
      \ feed into stored, deduplicated article metadata. feedparser\nparses RSS /\
      \ Atom; Open Graph + JSON-LD enrich thin entries; Trafilatura is\nthe readability\
      \ fallback for summary text. Articles persist in SQLite with\nURL as dedup key,\
      \ indexed by published_at. A daily cleanup prunes records\nolder than 30 days\
      \ (configurable).\n\n**Key functional areas:**\n\n- feedparser-driven RSS /\
      \ Atom parsing.\n- SQLite schema: Source and Article tables, indexes by URL\
      \ + published_at.\n- Deduplication by canonical URL.\n- Open Graph + JSON-LD\
      \ metadata enrichment.\n- Trafilatura summary fallback.\n- 30-day retention\
      \ cleanup job.\n\n**Out of scope:**\n\n- Full-text body storage (charter restricts\
      \ to metadata only).\n- AI extraction fallback (Phase 4+).\n- Playwright / dynamic-fetch\
      \ path (deferred — separate feature gated on\n  static-fetch failure).\n- Per-article\
      \ tagging (charter §3 out-of-scope).\n- Polling scheduling (see EP03).\n- Feed\
      \ display (see EP04).\n\n**Reference documents:**\n\n- DATA_MODEL.md §Source,\
      \ §Article (to be authored).\n\n---\n"
    acceptance_criteria: null
    relations: []
    features: []
  - id: EP-260512-2230-003
    project_id: PR-260512-2041-001
    type: EPIC
    created_at: '2026-05-12T22:35:00'
    created_by: CLAUDE_CODE
    cancelled_at: null
