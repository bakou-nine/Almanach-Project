        story_statement: As a user, I want the active source and any muted sources
          to look visually distinct in the sidebar, so that I can tell at a glance
          which filter is applied and which sources are dormant.
        tags: []
        body: "The two visual state variants of a source row on top of\nUS-260513-0010-001's\
          \ default rendering.\n\n**Active state (one source row at a time).** Set\
          \ when the user\nclicks a source row. Visual: white background (vs the sidebar's\n\
          `--bg-secondary`), 2 px left border in `--text-info` colour.\nBehavioural:\
          \ the feed pane (EP04) re-filters to show only that\nsource's articles.\
          \ Clicking a different row clears active on\nthe previous row and applies\
          \ it to the new one. Clicking the\n\"All sources\" virtual entry clears\
          \ active across all source\nrows and restores the combined feed.\n\n**Muted\
          \ state (any number of source rows).** Driven by\n`Source.muted = 1`. Visual:\
          \ opacity ~0.5 on the whole row,\nstrikethrough on the `display_name` label,\
          \ eye-off icon in\nplace of the unread-count pill (no count rendered).\n\
          Behavioural: clicking a muted row does NOT change the feed\nfilter — the\
          \ click is inert. The only way to interact with a\nmuted source is via the\
          \ ⋮ menu (FT04, including Unmute).\n\n**Data model fields touched:**\n\n\
          - `Source.muted` (read) — drives the muted visual.\n- `Source.id` (read)\
          \ — active-row tracking (via the URL filter\n  parameter or a client-side\
          \ selection state).\n\n**Spec reference:** UI_SPEC.md §Sidebar (active and\
          \ muted\nstates — to be authored); DATA_MODEL.md §1.1 Source (`muted`).\n"
        acceptance_criteria: null
