    # BUG — Two time semantics for the same date-filter endpoint

    ## Defect Summary

    computeFilterDateBounds (app.js:144-157) serialises shortcut chips (1d/1w/1m) via toISOString() (UTC, Z suffix) but custom ranges as naive local strings (YYYY-MM-DDT00:00:00). The backend compares both against stored naive-UTC values, so a custom range covering exactly the last day and the 1d chip can return different article sets, off by the user's UTC offset.

    ---

    ## Affected Requirements (CONFIRMS targets)

    - `US-260523-1906-001` — Feed Filter Bar — failing AC: AC-260704-0735-011

    ---

    ## Technical Approach

    **Files / functions to change:**
    - `02_code/almanach/static/js/app.js` — computeFilterDateBounds

    **Root cause:**
    Two serialisation code paths with different timezone semantics feed one comparison.

    **Fix outline:**
    Convert custom-range bounds to UTC before sending so both paths share one serialisation; verify boundary equality between the 1d chip and an equivalent custom range.
