      # EP04 — Feed Reading Experience

      ## Feature Navigation Flows

      (Features pending — next §5.1.1 round.)

      ---

      ## Body

      The reader UI. Two panes: sidebar (sources + "All sources" virtual
      entry + unread counts + auto colours) on the left, combined feed
      on the right (newest-first, **continuous scroll** — no page nav).
      Header bar above both panes shows app title plus
      "last sync · N min ago" and a manual refresh button. Clicking an
      article opens it in a new browser tab and marks it as read
      (one-way; charter §3 out-of-scope).

      **Key functional areas:**

      - Two-pane layout template + responsive breakpoint at 720px.
      - Sidebar rendering: source rows, active state, muted state visual,
        unread-count pills, "All sources" virtual entry at top.
      - Continuous-scroll feed (newest-first, batches of 50, append on
        scroll-near-bottom — owned by US-260522-2230-003,
        CR-260522-2101-001 iteration 2).
      - Article row layout: every card uses the same full layout
        (colour-dot · source · relative-time / bold title / two-line
        summary) — no compact variant. Per
        01_Docs/04_content/images/screenshot.png and AC-260522-2231-001
        (design-fidelity AC under CR-260522-2101-001).
      - Click-to-read: open new tab, write read_at on Article.
      - Header bar: app title + last-sync indicator + manual refresh
        button (wires to EP03 manual refresh).

      **Out of scope:**

      - Multi-mode feed sort (charter §3 — newest-first only).
      - Per-article tag pills (charter §3 out-of-scope).
      - Manual mark-as-unread (charter §3 — read state is one-way).
      - Native mobile apps (responsive web only).
      - Source CRUD (see EP01).
      - Article ingestion / storage (see EP02).
      - Pagination chrome (prev / next page nav) — removed by
        CR-260522-2101-001 iteration 2 in favour of continuous scroll.

      **Reference documents:**

      - UI_SPEC.md §TwoPaneLayout, §Sidebar, §Feed, §Header (to be
        authored).
      - 04_content/html/mockup.html (whole-screen reference — pre-CR).
      - 01_Docs/04_content/images/screenshot.png (target design — post-CR
        iteration 2).

