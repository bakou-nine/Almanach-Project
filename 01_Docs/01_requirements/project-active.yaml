      body: "# FT — Continuous-Scroll Feed\n\n## Wireframes\n\n- 01_Docs/04_content/images/screenshot.png\
        \ (target — no\n  pagination chrome anywhere in the feed pane).\n\n---\n\n\
        ## Body\n\nReplaces the page-based feed (50/page with prev / next nav)\nwith\
        \ a single continuously-scrolling list. Initial render\nloads the newest 50\
        \ articles; when the user scrolls within\n~200 px of the bottom, the client\
        \ requests the next 50 via\n`/feed-partial?after=<published_at>&size=50` and\
        \ appends.\n\nEnd-state: when an \"after\" fetch returns fewer than `size`\n\
        articles, the client stops requesting (no more articles).\nThe empty-state\
        \ message (existing pattern) shows only when\nthe feed is empty on first render.\n\
        \nActive-source filter (sidebar source-row click) and manual\nrefresh are\
        \ unchanged — both rebuild the feed from the top\n(page 1 equivalent) and\
        \ restart the scroll cycle.\n\n**Out of scope:**\n\n- Reverse-scroll (loading\
        \ newer-than-top articles in-place) —\n  a manual refresh / All-sources click\
        \ resets to top.\n- Skeleton placeholders — a lightweight inline spinner at\
        \ the\n  bottom-most edge of the list suffices.\n\n**Reference documents:**\n\
        \n- 01_Docs/04_content/images/screenshot.png.\n- DATA_MODEL.md §3 (`idx_article_published_at`\
        \ — already\n  present, supports the cursor-style next-batch query).\n\n---\n"
