        body: |
          Background scheduler that fires a poll cycle every N minutes (configurable; runtime default 10 min per BUG-260521-2051-001) while the app process is up. Each cycle iterates every non-muted Source and triggers the EP02 ingestion path. On successful completion of a source's poll, updates `Source.last_polled_at` to the current timestamp.

