      body: |
        # FT — Continuous-Scroll Feed

        ## Wireframes

        - 01_Docs/04_content/images/screenshot.png (target — no
          pagination chrome anywhere in the feed pane).

        ---

        ## Body

        Replaces the page-based feed (50/page with prev / next nav)
        with a single continuously-scrolling list. Initial render
        loads the newest 50 articles; when the user scrolls within
        ~200 px of the bottom, the client requests the next 50 via
        `/feed-partial?after=<published_at>&size=50` and appends.

        End-state: when an "after" fetch returns fewer than `size`
        articles, the client stops requesting (no more articles).
        The empty-state message (existing pattern) shows only when
        the feed is empty on first render.

        Active-source filter (sidebar source-row click) and manual
        refresh are unchanged — both rebuild the feed from the top
        (page 1 equivalent) and restart the scroll cycle.

        **Out of scope:**

        - Reverse-scroll (loading newer-than-top articles in-place) —
          a manual refresh / All-sources click resets to top.
        - Skeleton placeholders — a lightweight inline spinner at the
          bottom-most edge of the list suffices.

        **Reference documents:**

        - 01_Docs/04_content/images/screenshot.png.
        - DATA_MODEL.md §3 (`idx_article_published_at` — already
          present, supports the cursor-style next-batch query).

        ---
