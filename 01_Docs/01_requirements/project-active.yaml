  body: "## Description\n\nBudget and error-mapping contract for US-260513-0000-004.\
    \ Two\ndistinct guarantees verified in one AC: (a) total time bounded at\n10 s,\
    \ (b) when every step fails, the user-visible error is the\ndeepest step's reason\
    \ — typically `no_sitemap` /\n`sitemap_unparsable` / `fetch_error`, never `no_alternate_link`.\n\
    \n## Test Instructions\n\n1. Stub each step to take 4 s (12 s total). Call `discover`.\
    \ Confirm\n   the call returns within ~10 s (not 12 s) — the orchestrator\n  \
    \ short-circuits the last step when the remaining budget drops\n   below its per-step\
    \ timeout.\n2. Stub all three steps to fail synchronously with their respective\n\
    \   reasons (`no_alternate_link`, `all_common_paths_404`,\n   `no_sitemap`). Call.\n\
    3. Confirm response is\n   `{error: \"no_sitemap\", details: <step 3's details>}`\
    \ — NOT\n   `error: \"no_alternate_link\"`.\n"
