  updated_by: CLAUDE_CODE
  approved_by_human: true
  cancellation_reason: null
  tags: []
  body: '## Description

    Date-range filter — shortcut mode. Each chip applies a relative window: 1d = last
    24 h, 1w = last 7 days, 1m = last 30 days, computed from the current moment. Chips
    are mutually exclusive — clicking one deselects the others. Clicking the active
    chip again clears the shortcut. Shortcut chips and the explicit date-range picker
    share the same underlying date predicate (setting one clears the other).


    ## Test Instructions


    1. Click the "1d" chip.

    2. Verify the chip enters an active state and the feed shows only articles published
    within the last 24 hours.

    3. Click the "1w" chip. Verify "1d" is no longer active, "1w" is active, and the
    feed shows articles within the last 7 days.

    4. Click the active "1w" chip again. Verify the chip clears and the feed returns
    to its default (no date constraint).

    5. Apply "1m", then open the explicit date-range picker and select a custom range.
    Verify "1m" deselects when the custom range is applied.

    '
