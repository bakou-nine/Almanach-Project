        cancellation_reason: null
        story_statement: As a user, I want the feed to keep loading older articles as I scroll instead of pressing a Next Page button, so that I can read fluidly through the day's news without breaking my reading rhythm.
        tags: []
        body: |
          Replaces the per-page pagination (50/page with prev/next nav,
          legacy `_feed.html` ≤ Piece-B) with a cursor-style continuous
          scroll.

          Client behaviour:
          - Initial render: first 50 articles, newest-first.
          - When the user scrolls within 200 px of the feed-pane
            bottom AND a fetch is not already in flight AND end-of-feed
            has not been observed, request the next batch.
          - Append the returned articles below the current list.
          - A short inline spinner renders at the bottom while the
            fetch is in flight.
          - When the response holds fewer than `size` articles, mark
            end-of-feed and stop further requests until the cycle is
            reset (by source filter change or manual refresh).

          Server behaviour (extends `/feed-partial`):
          - Existing `source` filter unchanged.
          - New optional query param `after` (an article
            `published_at` ISO timestamp). When present, the response
            includes articles strictly older than `after`. When
            absent, the response starts from the newest article.
          - `size` defaults to 50 (kept as a knob; same as today).
          - The HTML fragment returned is a list of `.article` cards
            ONLY — no surrounding feed-header, no pagination nav. The
            client appends them as innerHTML children of the
            `.article-list` container.

          Removed:
          - `.pagination` block in `_feed.html`.
          - `feed.page` / `feed.pages` / `feed.has_prev` / `feed.has_next`
            payload fields in `build_feed_view`.

          Active-source filter switching and manual refresh both rebuild
          the feed from the top (cursor reset). All other behaviour
          (article click-to-read, mute filter, banner placement) is
          unchanged.

          **Data model fields touched:**

          - `Article.published_at` (read — cursor key).
          - `Article.source_id`, `Source.muted` (read — combined-feed
            filter, unchanged contract; plus the new cascade-mute
            predicate from US-260522-2230-002).

          **Spec reference:** DATA_MODEL.md §3
          (`idx_article_published_at`); screenshot.png (no pagination
          chrome anywhere).
