        # FT01 — Source Add Flow

        ## Wireframes

        (Pending §5.1.2 design phase — mockup shows the sidebar `+` button
        at 04_content/html/mockup.html line 346.)

        ---

        ## Body

        The user-facing path from "I want to follow lemonde.fr" to a saved
        Source in the DB with a sidebar row. Trigger: `+` icon in the sidebar
        header opens a small form (or modal) with one URL input field. User
        pastes a homepage URL.

        Submission flow:

        1. Client-side validation: URL format (scheme http/https, valid host).
           Inline error if invalid.
        2. Server-side dedup check against existing Sources (canonical hostname
           match). Inline error "already added" if duplicate.
        3. Discovery dispatch: call FT02 waterfall with the homepage URL.
        4. On FT02 success → assign next available palette colour (round-robin
           through the curated 12-colour list, collisions ignored after
           exhaustion), persist the Source row, return success. Sidebar
           re-renders to show the new source row.
        5. On FT02 failure → inline error citing which step failed (per FT02's
           structured error reasons: no_alternate_link, all_common_paths_404,
           no_sitemap, sitemap_unparsable, fetch_error). No Source persisted.

        Success target: ≤ 1 s from submit to sidebar row appearing for a
        responsive target site.

        **Out of scope:**

        - Discovery algorithm itself (see FT02).
        - Sidebar rendering (see FT03).
        - Action menu / rename / remove (see FT04).
        - Bulk import (CSV, OPML) — not in MVP.
        - Manual feed-URL paste (auto-discovery is the only entry path).

        **Reference documents:**

        - DATA_MODEL.md §Source (fields: id, url, display_name, feed_url,
          discovery_method, colour, muted, created_at, last_polled_at,
          last_error — to be authored).
        - UI_SPEC.md §SourceAddForm (to be authored).
        - 04_content/html/mockup.html (sidebar `+` button).

        ---
