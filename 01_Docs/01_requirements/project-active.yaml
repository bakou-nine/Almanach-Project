      ---

      ## Body

      Source CRUD + the discovery waterfall that resolves a homepage URL
      to a usable feed. Sidebar ⋮ menu drives rename / mute / remove;
      rename changes display label only, canonical URL is immutable;
      mute hides from feed and keeps polling. Sources can additionally
      be organised into a 2-level Group → Subgroup tree (FT05, added by
      CR-260522-2101-001) with drag-and-drop reassignment, inline
      rename of group / subgroup titles, and an Ungrouped overflow zone.

      **Key functional areas:**

      - Source-add form (URL paste → discovery waterfall → save).
      - Discovery waterfall: RSS/Atom alternate-link → /feed | /rss
        | /atom.xml → sitemap.xml | news-sitemap.xml fallback.
      - Sidebar source-row rendering (active, muted, unread-count pill).
      - ⋮ action menu (rename, mute / unmute, remove).
      - Auto colour assignment from the curated palette.
      - Source grouping & organisation: Group / Subgroup CRUD, tree
        rendering, drag-and-drop, inline rename, onboarding banner
        (FT05).

      **Out of scope:**

      - Manual feed-URL paste (auto-discovery is the only entry path).
      - AI-assisted discovery (Phase 4+).
      - Per-source polling interval (single global; see EP03).
      - Article parsing / storage (see EP02).
      - Tree depth beyond 2 levels (Group → Subgroup is the maximum
        in FT05).
      - Per-group / per-subgroup colour assignment (Source.colour
        still rules).

