        story_statement: As a caller of the discovery service (US-260512-2300-003),
          I want to receive either a resolved feed URL or a structured error explaining
          which step in the waterfall failed, so that the source-add flow can surface
          a specific reason to the user.
        tags: []
        body: "Public service entry point: `discover(url: str) → DiscoveryResult`.\n\
          Calls US-260513-0000-001 (head scan); if `success`, returns\n`{feed_url,\
          \ method: \"alternate_link\"}`. Otherwise calls\nUS-260513-0000-002 (common-path);\
          \ if `success`, returns\n`{feed_url, method: \"common_path\"}`. Otherwise\
          \ calls\nUS-260513-0000-003 (sitemap); if `success`, returns\n`{feed_url,\
          \ method: \"sitemap\"}`. If all three fail, returns\n`{error: <last step's\
          \ reason code>, details: <last step's details>}`\n— note the error code\
          \ is the LAST step's reason (typically\n`no_sitemap` / `sitemap_unparsable`\
          \ / `fetch_error`), NOT step\n1's `no_alternate_link`. Enforces a total\
          \ wall-clock budget of\n10 s across all three steps (cumulative timeout\
          \ — when remaining\nbudget drops below the next step's per-step timeout,\
          \ the\norchestrator passes the remaining budget instead of the default).\n\
          Stateless.\n\n**Data model fields touched:**\n\n- (none — stateless function.\
          \ Caller US-260512-2300-003 maps the\n  success result onto Source fields\
          \ per its own AC.)\n\n**Spec reference:** DATA_MODEL.md §1.1 Source (`feed_url`,\n\
          `discovery_method`).\n"
