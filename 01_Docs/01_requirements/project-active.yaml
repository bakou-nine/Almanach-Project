        story_statement: As a reader, I want clicking and shift-clicking sources, so that I can build a multi-source filter directly from the sidebar.
        tags: []
        body: |
          Adds two-way coupling between the sidebar selection and the right-pane
          content-selection filter (US-260523-1906-001 dropdown). A plain click on a
          Group / Subgroup / Source title ticks the matching filter entries (and
          unticks the rest) so the filter mirrors the sidebar selection; this extends
          the feed-scope behaviour of US-260523-1906-002 (which only scoped the feed)
          to also drive the filter UI. Shift-click adds rows cumulatively
          (multi-select); shift-clicking an already-selected row removes it. Clicking
          a parent (Group) propagates the checked state to all its descendant sources
          in the filter, after which the user may untick individual descendants
          without losing the rest. Sits alongside US-260523-1906-001 (filter bar) and
          US-260523-1906-002 (sidebar scope) under FT-260522-2230-001; introduced by
          CR-260525-0745-002.

          **Data model fields touched:**

          - `Source.group_id`, `Source.subgroup_id`, `Article.source_id` (read — map
            a sidebar selection to its member sources and the filter predicate)

          **Spec reference:** CR-260525-0745-002 §Change Summary; existing filter bar
          (US-260523-1906-001) and sidebar scope (US-260523-1906-002). Wireframe
          pending §5.1.2.
