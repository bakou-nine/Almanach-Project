        story_statement: As a user, I want to mute a group or subgroup (its sources
          stop showing in the combined feed but keep polling), so that I can pause
          a whole subject area without unsubscribing or muting each source one by
          one.
        tags: []
        body: "Adds `muted` (INTEGER 0/1, default 0) to both `group` and\n`subgroup`\
          \ tables. Cascade-mute predicate per DATA_MODEL.md\n§2.3: a Source's articles\
          \ are visible in the combined feed iff\n`Source.muted = 0 AND Group.muted\
          \ = 0 AND Subgroup.muted = 0`\n(treating NULL FKs as if the corresponding\
          \ parent's muted = 0).\nPolling (EP03) is unaffected — charter §3 source-mute\
          \ rule\nextends literally to titles.\n\nSource-filtered views (sidebar source-row\
          \ click) still show\narticles for the explicitly-selected source even when\
          \ its\nparent group or subgroup is muted — the cascade applies to the\n\
          combined \"All sources\" view only. (Mirrors FT04 behaviour\nwhere clicking\
          \ a muted source still navigates to its own\nfiltered feed.)\n\nRender contract:\n\
          \n- Muted Group row: opacity ~0.5, name with strikethrough,\n  ti-eye-off\
          \ icon in place of the unread-count pill.\n- Muted Subgroup row: same visual.\n\
          - Aggregated pill on a muted group / subgroup is hidden (per\n  the rule\
          \ above — no unread count surfaced).\n- Sources rendered under a muted group\
          \ or subgroup inherit a\n  dimmed look (opacity ~0.7) so the cascade is\
          \ observable, but\n  they do NOT individually flip `Source.muted` — that\
          \ field is\n  preserved as the user set it. Unmuting the title restores\n\
          \  the per-source state literally.\n\nEndpoints (touch-points on US-260522-2116-002\
          \ endpoints; this\nstory adds no new endpoints):\n\n- PATCH /groups/{id}\
          \ accepts `muted: bool`.\n- PATCH /subgroups/{id} accepts `muted: bool`.\n\
          \n**Data model fields touched:**\n\n- `Group.muted` (write).\n- `Subgroup.muted`\
          \ (write).\n- `Source.muted` (read — preserved through title mute toggles).\n\
          - `Article.read_at`, `Article.source_id` (read — feed filter).\n\n**Spec\
          \ reference:** DATA_MODEL.md §1.4 / §1.5 (new `muted`\ncolumn), §2.3 (cascade\
          \ predicate); charter §3 source-mute\ndecision.\n"
