  body: '## Description


    Keyword control introduced by CR-260524-0644-001 (see its Change Summary). The

    input sits in the filter bar (US-260523-1906-001) beside the date and

    content-selection controls. Typing a word and pressing Enter adds it as an active

    keyword (a removable chip); the feed is then constrained to articles whose

    `Article.title` or `Article.summary` contains that word as a case-insensitive

