      body: "# FT05 — Source Grouping & Organisation\n\n## Wireframes\n\n- 01_Docs/03_design/01_wireframes/feature\
        \ level/FT05_source_grouping.html\n- 01_Docs/04_content/html/Almanach _standalone_.html\
        \ (human-supplied reference)\n- 01_Docs/04_content/images/screenshot.png (target\
        \ state)\n\n---\n\n## Body\n\nAdds a 2-level organisation tree on top of FT03's\
        \ flat source list:\nGroup → Subgroup → Source. Sources may sit at three positions\
        \ in the\ntree: under a subgroup, directly under a group, or in the Ungrouped\n\
        overflow zone at the bottom (NULL group_id and NULL subgroup_id).\nSubgroups\
        \ always belong to exactly one group.\n\nAffordances (all live in the sidebar\
        \ — no separate settings surface):\n\n- `+` button next to the SOURCES header\
        \ → create-group inline input\n  (US-260522-2116-005).\n- On-hover `+` on\
        \ a group row → create-subgroup inline input\n  (US-260522-2116-006).\n- Double-click\
        \ a group or subgroup title → inline rename\n  (US-260522-2116-007). Enter\
        \ saves, Esc cancels, blur saves.\n- Chevron on every group / subgroup row\
        \ → collapse / expand;\n  collapsed state persists in the DB (US-260522-2116-004).\n\
        - Drag a source row onto a group, subgroup, or the Ungrouped zone\n  → reassigns\
        \ `Source.group_id` / `Source.subgroup_id`\n  (US-260522-2116-008).\n- Drag\
        \ a subgroup row onto another group → reassigns\n  `Subgroup.group_id` (US-260522-2116-008).\n\
        - First-run onboarding banner above the feed pane, dismissible (`×`),\n  auto-dismisses\
        \ after the first group is created (US-260522-2116-009).\n\nTree rendering\
        \ rules (US-260522-2116-003):\n\n- Every group, when expanded, lists subgroups\
        \ (in `position` order)\n  followed by sources directly attached to the group\
        \ (in `position`\n  order).\n- Every subgroup, when expanded, lists its sources\
        \ (in `position`\n  order).\n- Ungrouped zone always rendered (even when empty)\
        \ at the bottom\n  with the fixed label \"Ungrouped\"; counts only its direct\
        \ sources.\n- Unread-count pills aggregate up the tree: a group pill = sum\
        \ of\n  its direct sources + sum of each subgroup's direct sources.\n- \"\
        All sources\" virtual entry remains at the top with the global\n  unread sum\
        \ (unchanged from FT03).\n\nBackend contract: every CRUD action on Group /\
        \ Subgroup or every\nwrite to `Source.group_id` / `Source.subgroup_id` returns\
        \ the\nrefreshed sidebar tree partial (US-260513-0010-003, re-opened by\n\
        this CR to return the tree-aware payload).\n\n**Out of scope:**\n\n- Three-or-more\
        \ level nesting (Group → Subgroup is the maximum depth).\n- Per-group / per-subgroup\
        \ colour assignment (`Source.colour` still\n  rules at row level).\n- Smart\
        \ auto-grouping (no AI / clustering — manual organisation only).\n- Sharing\
        \ / exporting group structure between users (single-user MVP).\n- Search-within-sidebar.\n\
        - Reordering siblings inside a group / subgroup beyond the natural\n  drag-out\
        \ / drag-in pattern (no explicit \"move up / move down\"\n  affordance in\
        \ MVP).\n\n**Reference documents:**\n\n- DATA_MODEL.md §1.4 Group, §1.5 Subgroup,\
        \ §1.1 Source (`group_id`,\n  `subgroup_id` FKs + invariant), §3 (new indexes),\
        \ §6\n  (`grouping_banner_dismissed` setting key).\n- 01_Docs/03_design/01_wireframes/feature\
        \ level/FT05_source_grouping.html\n  (assembled feature board).\n- 01_Docs/03_design/01_wireframes/feature\
        \ level/journey level/\n  (per-story journey boards).\n- CR-260522-2101-001\
        \ (driver — full change context).\n\n---\n"
