  body: "# CR-260522-2101-001 — Grouping news sources\n\n## Change Summary\n\nHuman-authored\
    \ request to add a 2-level organisation tree (Group →\nSubgroup → Source) on top\
    \ of FT03's flat sidebar, plus (iteration 2,\nuser chat 2026-05-22T22:30) a Notion-style\
    \ drag-anywhere UX, title\naction menus mirroring source rows, group/subgroup\
    \ mute with cascade,\npagination removal in favour of continuous scroll, and full\
    \ design\nfidelity to the human-supplied screenshot.\n\nAffordances per the screenshot\
    \ at 01_Docs/04_content/images/screenshot.png\nand the HTML mockup at 01_Docs/04_content/html/Almanach\
    \ _standalone_.html:\n\n- `+` button in the sidebar header to create a Group;\
    \ on-hover `+`\n  on a group row to create a Subgroup.\n- **Drag any title or\
    \ source anywhere** (iteration 2): Y-position sets\n  sibling above/below; X-offset\
    \ relative to the target row's\n  content-start sets nesting depth — drag right\
    \ of a row to become\n  its child, drag left to outdent. Groups reorder among\
    \ groups;\n  subgroups reorder within their parent group or move to another;\n\
    \  sources go anywhere (under any group / any subgroup / Ungrouped).\n- **Title\
    \ action menu** (iteration 2): every group and subgroup row\n  gains a ⋮ menu\
    \ mirroring FT04 source rows — Rename / Mute / Remove.\n- **Title mute with cascade**\
    \ (iteration 2): muting a group or\n  subgroup hides every member source from\
    \ the combined feed; polling\n  continues unchanged (charter §3 source-mute rule\
    \ extends to title\n  mute).\n- Double-click a group / subgroup title to rename\
    \ inline.\n- First-run onboarding banner explaining the gestures.\n\nRight-pane\
    \ (iteration 2):\n\n- **No pagination.** Feed scrolls continuously — scrolling\
    \ near the\n  bottom fetches and appends the next batch.\n- **Design fidelity**\
    \ to screenshot.png across the whole UI: every\n  article card uses the same full\
    \ layout (colour-dot · source · time\n  / bold title / 2-line summary); no compact\
    \ variant; refresh icon\n  subtle in the top-right of the feed pane.\n\nOriginal\
    \ human-supplied prose (verbatim, iteration 1):\n\n> I want to group my news into\
    \ groups like AI and sub groups i can\n> create in it. it should be easy for a\
    \ user to createa title, then\n> drag and drop a news source under one group title,\
    \ create a sub\n> title and do the same by draging and droping.. easy peasy\n\
    >\n> ==> Follow design guidance below from html/screenshot\n>\n> [Almanach _standalone_](01_Docs/04_content/html/Almanach\
    \ _standalone_.html)\n>\n> ![screenshot](01_Docs/04_content/images/screenshot.png)\n\
    \nIteration 2 prose (verbatim, 2026-05-22T22:30):\n\n> i want now that you make\
    \ sure it is possible to drag and drop\n> titles anywhere along with their content.\
    \ it must be possible to\n> drag and drop news sources under any title whatever\
    \ the level. any\n> title should be possible to be removed or title change or\
    \ fully\n> muted in same way as a news source would be. … take the design\n> screenshot\
    \ and apply it \"à la lettre\" , not only the left pane\n> but also the right\
    \ one and the whole application as it looks in\n> the design. Stop the pagination,\
    \ i want to be able to scroll\n> instead of changeing page to render more news.\n\
    \n---\n\n## Affected Requirement Objects\n\n| ID — Title | Action | Status transition\
    \ |\n| :--- | :--- | :--- |\n| EP-260512-2230-001 — Source Management | modified\
    \ (body) | OPEN → OPEN |\n| EP-260512-2230-004 — Feed Reading Experience | modified\
    \ (body — iteration 2) | OPEN → OPEN |\n| FT-260512-2245-003 — Source List & Sidebar\
    \ Rendering | modified (body) | SOLVED → OPEN |\n| FT-260522-2115-001 — Source\
    \ Grouping & Organisation | added (body extended iteration 2) | DRAFT → OPEN |\n\
    | US-260522-2116-001 — Folder Data Model & Storage | added | DRAFT → OPEN |\n\
    | US-260522-2116-002 — Folder CRUD Endpoints | added | DRAFT → OPEN |\n| US-260522-2116-003\
    \ — Sidebar Tree Rendering | added | DRAFT → OPEN |\n| US-260522-2116-004 — Collapsible\
    \ Group & Subgroup Rows | added | DRAFT → OPEN |\n| US-260522-2116-005 — Create-Group\
    \ Affordance | added | DRAFT → OPEN |\n| US-260522-2116-006 — Create-Subgroup\
    \ Affordance | added | DRAFT → OPEN |\n| US-260522-2116-007 — Inline Rename via\
    \ Double-Click | added | DRAFT → OPEN |\n| US-260522-2116-008 — Drag-and-Drop\
    \ Reassignment | added (body extended iteration 2 — Notion-style outliner D&D)\
    \ | DRAFT → OPEN |\n| US-260522-2116-009 — First-Run Onboarding Banner | added\
    \ | DRAFT → OPEN |\n| US-260522-2230-001 — Title Action Menu | added (iteration\
    \ 2) | DRAFT → OPEN |\n| US-260522-2230-002 — Group & Subgroup Mute | added (iteration\
    \ 2) | DRAFT → OPEN |\n| US-260522-2230-003 — Continuous-Scroll Feed | added (iteration\
    \ 2 — supersedes pagination) | DRAFT → OPEN |\n\n---\n\n## Design Changes\n\n\
    §5.1.2 design pass run as part of iteration 1. Boards authored:\n\n- 01_Docs/03_design/01_wireframes/feature\
    \ level/FT05_source_grouping.html\n  (feature-level board — sidebar in tree state).\n\
    - 01_Docs/03_design/01_wireframes/feature level/journey level/\n  FT05_US3_tree_rendering.html\
    \ (tree DOM contract).\n- …/journey level/FT05_US5_create_group.html (create-group\
    \ flow).\n- …/journey level/FT05_US8_drag_drop.html (drag indicator).\n- …/journey\
    \ level/FT05_US9_onboarding_banner.html (first-run banner).\n\nIteration 2 does\
    \ not author new wireframes — `01_Docs/04_content/images/screenshot.png`\nis the\
    \ canonical reference for the whole-app design; the\nimplementation matches it\
    \ `à la lettre` per AC-260522-2231-001\n(design fidelity AC).\n\n## Data Model\
    \ Changes\n\nIteration 1 — DATA_MODEL.md additions: §1.4 Group, §1.5 Subgroup,\
    \ §1.1\nSource FK columns, §2 new cascades, §3 new indexes, §6 new setting\nkey\
    \ `grouping_banner_dismissed`.\n\nIteration 2 — DATA_MODEL.md additions: §1.4\
    \ and §1.5 each gain a\n`muted` INTEGER column (0/1, default 0). §2.3 documents\
    \ the\ncascade-mute predicate: a Source is visible in the combined feed iff\n\
    `Source.muted=0 AND Group.muted=0 AND Subgroup.muted=0`. Polling\n(EP03) is unaffected\
    \ — charter §3 source-mute rule extends literally.\n\nSchema is additive — no\
    \ destructive rewrite. See AC-260522-2117-007\nfor the migration safety contract.\n\
    \n## Supersede / Versioning\n\n(none — net-new behaviour. No requirement objects\
    \ superseded. The\nlegacy pagination implementation is replaced in-place by\n\
    US-260522-2230-003 without a SUPERSEDES relation, since the page\nnav was never\
    \ modelled as a discrete US.)\n\n## Scope Impact Assessment\n\n- **Features affected\
    \ (iteration 1):** EP-260512-2230-001 (body);\n  FT-260512-2245-003 (body + status);\
    \ FT-260522-2115-001 (new).\n- **Features affected (iteration 2):** EP-260512-2230-004\
    \ (body —\n  pagination removed); FT-260522-2115-001 (body extended +\n  `children_ids`\
    \ updated for two new US).\n- **Features blocked:** (none).\n- **Regression risk:**\
    \ (a) FT03 flat-list rendering and FT04 ⋮ menu\n  must keep working with zero\
    \ Groups (AC-260522-2117-006 guards\n  this); (b) muted source rows + the existing\
    \ per-source mute path\n  must remain operational after title mute lands; (c)\
    \ the no-page\n  scroll must not regress the active-source filter, the manual\n\
    \  refresh, or article click-to-read.\n- **Breaking changes:** SQLite schema migration\
    \ required (additive\n  DDL only — `muted` columns added on group + subgroup).\
    \ Existing\n  rows preserved.\n\n---\n\n## Iteration 3 — Recursive folder model\
    \ (2026-05-23T00:00)\n\nHuman chat directive: \"make sure i can go until five\
    \ levels of sub\ntitles and keep the same drag and drop logic across all those\n\
    levels\". Implementation interpretation:\n\n- The two-table `group` + `subgroup`\
    \ model is collapsed into a\n  single self-referential `folder` table (`folder.parent_id`\
    \ →\n  `folder.id`, NULL = root folder).\n- Maximum nesting depth = 5 (root folder\
    \ = depth 1, deepest folder\n  = depth 5). Inserts and parent-change moves that\
    \ would push a\n  subtree's max-depth above 5 are rejected at the API with 422\n\
    \  `error: depth_limit`.\n- Sources attach via a single `Source.folder_id` FK\
    \ (replaces the\n  pair `group_id` + `subgroup_id`). NULL = Ungrouped zone.\n\
    - Notion-style drag-and-drop UX (Y above/below, X right=child /\n  left=outdent)\
    \ applies identically at every depth.\n- Cascade-mute walks the folder ancestry\
    \ chain: a Source's articles\n  are visible in the combined feed iff `Source.muted=0`\
    \ AND no\n  ancestor folder has `muted=1`.\n\n**Iteration-3 migration** (additive\
    \ + destructive on the legacy\nfolder tables):\n\n1. CREATE TABLE `folder` (id,\
    \ parent_id, name, position, collapsed,\n   muted, depth, created_at).\n2. ALTER\
    \ TABLE source ADD COLUMN folder_id TEXT REFERENCES\n   folder(id) ON DELETE SET\
    \ NULL.\n3. INSERT INTO folder SELECT … FROM `group` (depth=1, parent_id=NULL).\n\
    4. INSERT INTO folder SELECT … FROM subgroup (depth=2,\n   parent_id=<corresponding\
    \ group's folder id>).\n5. UPDATE source SET folder_id = COALESCE(<matched-subgroup-folder>,\n\
    \   <matched-group-folder>) — subgroup takes precedence over group\n   when both\
    \ were set, preserving the iteration-1 invariant.\n6. DROP TABLE subgroup; DROP\
    \ TABLE `group`.\n7. ALTER TABLE source DROP COLUMN group_id; DROP COLUMN subgroup_id.\n\
    \nNo article row touched. Migration verified by AC-260522-2400-002.\n\n**Affected\
    \ requirement objects — iteration 3:**\n\n| ID — Title | Action | Status transition\
    \ |\n| :--- | :--- | :--- |\n| US-260522-2116-001 — Folder Data Model & Storage\
    \ | body retargeted to recursive Folder + depth cap | OPEN → OPEN |\n| US-260522-2116-002\
    \ — Folder CRUD Endpoints | body retargeted from `/groups`+`/subgroups` to single\
    \ `/folders` | OPEN → OPEN |\n| US-260522-2116-003 — Sidebar Tree Rendering |\
    \ body extended for recursive depth 1..5 | OPEN → OPEN |\n| US-260522-2116-008\
    \ — Drag-and-Drop Reassignment | body extended: same logic at any depth | OPEN\
    \ → OPEN |\n\nNo new US authored in this iteration — the existing FT05 stories\n\
    cover the full recursive model. Four new CR-level AC capture the\nnet-new contract:\n\
    \n- AC-260522-2400-001 — depth-5 invariant enforced at insert + move.\n- AC-260522-2400-002\
    \ — migration from group + subgroup → folder\n  preserves every source's parent\
    \ attachment.\n- AC-260522-2400-003 — tree renders at every depth 1..5 with\n\
    \  progressive indentation.\n- AC-260522-2400-004 — drag-drop X-axis logic operates\
    \ at every\n  depth, respecting the 5-level cap.\n\n---\n"
