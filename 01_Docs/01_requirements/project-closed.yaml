      body: "# FT04 — Source Row Action Menu\n\n## Wireframes\n\n(Pending §5.1.2 —\
        \ mockup does not show the ⋮ menu open state.)\n\n---\n\n## Body\n\nThe ⋮\
        \ (vertical dots) icon button on each source row, hover-revealed.\nClick opens\
        \ a small floating menu beside the row with three items:\n\n- **Rename.**\
        \ Replaces the source name with an inline editable text\n  input. Enter saves,\
        \ Esc cancels. Saves the `display_name` field on\n  Source. The canonical\
        \ `url` / `feed_url` is NOT touched.\n- **Mute / Unmute.** Toggles the `muted`\
        \ boolean on the Source.\n  Immediately flips the row to muted state (FT03\
        \ visual) or back.\n  Polling continues regardless of muted state per charter\
        \ §3.\n- **Remove.** Opens a confirmation dialog with the source name in the\n\
        \  prompt (\"Remove {name}? This will delete the source and all its\n  articles.\"\
        ). On confirm: cascade-delete the Source AND every\n  Article whose `source_id`\
        \ references it, in a single DB transaction.\n  Sidebar row disappears within\
        \ 500 ms of confirm. On cancel: dialog\n  closes, no DB change.\n\nMenu auto-close:\
        \ when the user clicks outside the menu, or hovers off\nthe source row for\
        \ > 300 ms.\n\nThe ⋮ button is hidden on the \"All sources\" virtual entry\
        \ (no action\nmenu on the aggregate row).\n\n**Out of scope:**\n\n- Source\
        \ colour change (auto-assigned in FT01, no user override in\n  MVP per charter\
        \ §3).\n- Per-source interval override (charter §3 — global only, see EP03).\n\
        - Bulk actions (multi-select remove, etc.) — not in MVP.\n- Undo for remove\
        \ — the confirmation dialog is the only safety.\n\n**Reference documents:**\n\
        \n- DATA_MODEL.md §Source.display_name, §Source.muted, cascade-delete\n  rule\
        \ on Source.remove → Article (to be authored).\n- UI_SPEC.md §SourceRowMenu\
        \ (to be authored).\n\n---\n"
