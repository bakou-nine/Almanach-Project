  body: "# BUG02 — Same-level drag-and-drop reorder unstable\n\n## Defect Summary\n\
    \nWhen the user drags a sidebar row (source, group, or subgroup) and drops\nit\
    \ above or below a sibling row at the same hierarchy level (same-level\nreorder,\
    \ NOT a nesting move), the visual feedback during drag is unstable\n— drop indicator\
    \ flickers, sibling rows jitter as the drop position is\nrecomputed, and on drop\
    \ the final order does not always match the\nindicator's last position. This is\
    \ the Notion-style Y-axis \"above /\nbelow\" reorder branch of the existing drag-drop\
    \ logic asserted by\nAC-260522-2118-026 and AC-260522-2400-004. Reference: CR-260523-0842-001\n\
    body item 2 + 01_Docs/04_content/images/unstable manual drag and drop\nabove another\
    \ element so they are the same level but one come before\nthe other.png.\n\n---\n\
    \n## Affected Requirements (CONFIRMS targets)\n\n- `US-260522-2116-008` — Drag-and-Drop\
    \ Reassignment — failing AC: AC-260523-0900-010, AC-260523-0900-011, AC-260523-0900-012\n\
    - `FT-260522-2115-001` — Source Grouping & Organisation — failing AC: AC-260523-0900-013\n\
    \n---\n\n## Technical Approach\n\n**Files / functions to change:**\n\n- `02_code/filum/frontend/static/js/folder_tree.js`\
    \ (Notion-style outliner D&D module)\n- `02_code/filum/frontend/static/css/design-system/organisms/sidebar.css`\
    \ (drop-indicator visual)\n\n**Root cause:**\n\nY-axis above/below detection recomputes\
    \ drop position on every\n`dragover` event without debouncing or hysteresis, causing\
    \ the indicator\nto flicker between adjacent insertion points when the cursor\
    \ hovers near\na row boundary. Position computation may use stale rect data when\
    \ rows\nreflow during drag, producing the cursor-vs-final-order mismatch.\n\n\
    **Fix outline:**\n\n1. Hysteresis band (±6 px around row midpoints) on Y-axis\
    \ detection.\n2. Cache row rects at dragstart; recompute only on layout-affecting\n\
    \   events (resize, scroll), not on every `dragover`.\n3. Lock drop-indicator\
    \ final state at dragend to the same value used in\n   the PATCH payload (single\
    \ source of truth).\n4. Guard against re-targeting a row onto itself.\n\nPre-flight\
    \ §6.7 before frontend write.\n\n---\n"
