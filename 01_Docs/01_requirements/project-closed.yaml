          \ `_feed.html` ≤ Piece-B) with a cursor-style continuous\nscroll.\n\nClient\
          \ behaviour:\n- Initial render: first 50 articles, newest-first.\n- When\
          \ the user scrolls within 200 px of the feed-pane\n  bottom AND a fetch\
          \ is not already in flight AND end-of-feed\n  has not been observed, request\
          \ the next batch.\n- Append the returned articles below the current list.\n\
          - A short inline spinner renders at the bottom while the\n  fetch is in\
          \ flight.\n- When the response holds fewer than `size` articles, mark\n\
          \  end-of-feed and stop further requests until the cycle is\n  reset (by\
          \ source filter change or manual refresh).\n\nServer behaviour (extends\
          \ `/feed-partial`):\n- Existing `source` filter unchanged.\n- New optional\
          \ query param `after` (an article\n  `published_at` ISO timestamp). When\
          \ present, the response\n  includes articles strictly older than `after`.\
          \ When\n  absent, the response starts from the newest article.\n- `size`\
          \ defaults to 50 (kept as a knob; same as today).\n- The HTML fragment returned\
          \ is a list of `.article` cards\n  ONLY — no surrounding feed-header, no\
          \ pagination nav. The\n  client appends them as innerHTML children of the\n\
          \  `.article-list` container.\n\nRemoved:\n- `.pagination` block in `_feed.html`.\n\
          - `feed.page` / `feed.pages` / `feed.has_prev` / `feed.has_next`\n  payload\
          \ fields in `build_feed_view`.\n\nActive-source filter switching and manual\
          \ refresh both rebuild\nthe feed from the top (cursor reset). All other\
          \ behaviour\n(article click-to-read, mute filter, banner placement) is\n\
          unchanged.\n\n**Data model fields touched:**\n\n- `Article.published_at`\
          \ (read — cursor key).\n- `Article.source_id`, `Source.muted` (read — combined-feed\n\
          \  filter, unchanged contract; plus the new cascade-mute\n  predicate from\
          \ US-260522-2230-002).\n\n**Spec reference:** DATA_MODEL.md §3\n(`idx_article_published_at`);\
          \ screenshot.png (no pagination\nchrome anywhere).\n"
