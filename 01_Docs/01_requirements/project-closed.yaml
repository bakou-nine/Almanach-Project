        story_statement: As a user, I want to collapse and expand groups and subgroups
          via the chevron on each row, so that I can focus on the part of my tree
          I care about right now and have the collapse state persist across reloads.
        tags: []
        body: "Chevron icon (right or left of the row — design surface) on every\n\
          group and subgroup row. Click toggles `collapsed` via\nPATCH /groups/{id}\
          \ or /subgroups/{id} with `{collapsed: bool}`.\n\nWhen `collapsed = 1`:\n\
          - Group's subgroups + direct sources are not rendered\n  (server-side decision;\
          \ tree partial omits them).\n- Subgroup's sources are not rendered.\n- Chevron\
          \ rotates 90° (CSS only).\n- Aggregated unread pill still shows on the collapsed\
          \ row\n  (the count is computed regardless of collapse state).\n\nState\
          \ persists in the DB — reload restores the same collapse\nconfiguration.\n\
          \nClick on the chevron only — clicking elsewhere on the row does\nNOT toggle\
          \ collapse (avoids accidental collapse on rename\ndouble-click intent).\
          \ Click on group name area is reserved for\nrename (US-260522-2116-007)\
          \ and selection.\n\n**Data model fields touched:**\n\n- `Group.collapsed`,\
          \ `Subgroup.collapsed` (read + write).\n\n**Spec reference:** DATA_MODEL.md\
          \ §1.4, §1.5.\n"
