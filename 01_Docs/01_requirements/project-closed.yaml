  body: '# CR — Sidebar unread counts honour the active date filter


    ## Change Summary

    UAT feedback against CR-260523-1500-001: when the user picks a date affordance
    in the filter bar (`1d` / `1w` / `1m` shortcut OR a custom date range), the per-source
    unread pill, the recursive folder unread sums, and the All-sources total in the
    sidebar should all narrow to "unread within that window". Today the sidebar counts
    are computed off the full `Article.read_at IS NULL` aggregate ignorant of any
    filter-bar state, so the user sees the filter visibly reshape the right pane while
    the sidebar still advertises the unfiltered totals — confusing and inconsistent
    with the original CR-260523-1428-001 body ("filter ... applies to the left pane
    content").


    Scope is intentionally restricted to the date predicate. The content-selection
    multi-select (CR-260523-1500-001 AC-260523-1500-004) is NOT applied to sidebar
    counts: a sidebar that zeroes-out non-selected sources collides with the sidebar''s
    "always list every source" contract (US-260513-0010-001), and the filter bar already
    expresses the content predicate elsewhere. The sidebar folder scope introduced
    by CR-260523-1501-001 also stays out of scope — it scopes the feed, not the source
    list.


    ---


    ## Affected Requirement Objects

    | ID — Title | Action | Status transition |

    | :--- | :--- | :--- |

    | `US-260513-0010-001` — Sidebar Rendering | modified (per-source unread counts
    + All-sources total accept an optional date predicate; `/sidebar-partial` accepts
    `from` / `to` query params) | CLOSED → OPEN (on CR promotion per §5.2.2) |

    | `US-260522-2116-003` — Sidebar Tree Rendering | modified (recursive folder unread
    sums honour the same date predicate; bottom-up aggregation matches the per-source
    filtered counts) | CLOSED → OPEN (on CR promotion per §5.2.2) |


    ## Design Changes

    None. Sidebar layout, pill placement, colours, typography all unchanged. Only
    the numerical value rendered inside each pill changes when a date filter is active.


    ## Data Model Changes

    None. The date predicate composes over existing `Article.published_at` (indexed
    by `idx_article_published_at`, DATA_MODEL.md §3) and `Article.read_at IS NULL`.
    No schema migration.


    ## Supersede / Versioning

    (none)


    ## Scope Impact Assessment

    - **Features affected:** FT-260512-2245-003 (sidebar render), FT-260522-2115-001
    (sidebar tree). Frontend wiring on `app.js` to also send the active date predicate
    to `/sidebar-partial` whenever the filter bar updates.

    - **Features blocked:** none.

    - **Features unblocked:** none.

    - **Regression risk:** low — with no date filter set, the new code path collapses
    to the pre-CR aggregation; existing CLOSED AC under both USs continue to pass.
    Single point of caution: muted-cascade semantics already in `unread_counts_per_source()`
    / `total_unread_excluding_muted()` must be preserved when the date predicate is
    threaded through.

    - **Breaking changes:** none (`from` / `to` are additive optional query params
    on `/sidebar-partial`).


    ---

    '
