      body: "# FT03 — Source List & Sidebar Rendering\n\n## Wireframes\n\nSee 04_content/html/mockup.html\
        \ lines 343–403 (sidebar). §5.1.2\ndesign will expand to include the muted\
        \ state explicitly.\n\n---\n\n## Body\n\nThe left pane. Width 260 px, background\
        \ `--bg-secondary`. Header\nsection with \"SOURCES\" label and the `+` add\
        \ button (which\ntriggers FT01).\n\nSource rows (top to bottom) when no Groups\
        \ exist (flat-list\nmode, this FT's contract):\n\n- \"All sources\" virtual\
        \ entry at the very top: stack icon + label\n  \"All sources\" + unread-count\
        \ pill showing the SUM of every\n  source's unread count. Always rendered,\
        \ regardless of how many\n  sources exist. Clicking it sets the feed filter\
        \ to \"combined\"\n  (default).\n- 8 px gap below the virtual entry.\n- Each\
        \ real Source as a row: colour dot (the source's assigned\n  palette colour)\
        \ + display name (with text-ellipsis for overflow)\n  + unread-count pill\
        \ (right-aligned).\n- Active state (one source clicked / selected): white\
        \ background,\n  left border in `--text-info` colour. Filter the feed pane\
        \ to\n  that source.\n- Muted state (per FT04's mute toggle): opacity ~0.5,\
        \ name with\n  strikethrough, eye-off icon in place of the unread-count pill.\n\
        \  Clicking a muted row is allowed but does nothing (only FT04's\n  ⋮ menu\
        \ can unmute).\n\nWhen at least one Group exists, the tree layout from FT05\
        \ takes\nover the source-list block (see FT-260522-2115-001 body for the\n\
        full tree contract). This FT remains the owner of the flat\nfallback and of\
        \ the \"All sources\" virtual entry; FT05 layers on\ntop via US-260522-2116-003.\n\
        \nFooter: thin separator + \"Updated N min ago\" indicator (sourced\nfrom\
        \ EP04's header-bar last-sync timestamp).\n\nServer-rendered on every page\
        \ load. HTMX-style partial refresh\non source add / remove / mute / rename\
        \ (FT01 and FT04 dispatch\na sidebar refresh, no full page reload). FT05 additionally\n\
        triggers refresh on every Group / Subgroup CRUD or drag-drop\nwrite.\n\n**Out\
        \ of scope:**\n\n- Drag-to-reorder source rows (not in MVP).\n- Search-within-sidebar\
        \ (not in MVP).\n- The ⋮ action menu itself (see FT04).\n- Feed pane rendering\
        \ (see EP04).\n- Group / Subgroup tree rendering — owned by FT05\n  (FT-260522-2115-001).\n\
        \n**Reference documents:**\n\n- UI_SPEC.md §Sidebar (to be authored).\n- 04_content/html/mockup.html\
        \ (lines 343–403 — flat-list).\n- FT-260522-2115-001 (grouping tree layout\
        \ that wraps this FT).\n\n---\n"
