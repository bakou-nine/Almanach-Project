  story_statement: As a user, I want the header to always show me how long ago the
    last successful poll completed (across sessions), so that I know whether my feed
    is fresh without having to remember when I last refreshed.
  tags: []
  body: 'Header-bar text element rendering ''last sync · N min ago'' (or ''last sync
    · just now'' for <1 min). Value source: server reads MAX(`Source.last_polled_at`)
    across all sources on every render of the header. Result: opens of the app immediately
    reflect the most recent prior successful poll regardless of which session it ran
    in. The ''never'' / placeholder text is shown ONLY when zero sources have ever
    been polled (genuine empty state).


    Partial-refresh mechanism: after any poll cycle completes (manual via US-260522-2050-004
    OR scheduled via US-260522-2050-001 OR boot-time via US-260522-2050-002), the
    header element re-renders via an HTMX-style partial swap of the indicator subtree
    — no full page reload. Implementation: a small endpoint `GET /header-last-sync-partial`
    returns the rendered text fragment; poll-completion handlers trigger the swap.


    **Data model fields touched:**


    - `Source.last_polled_at` (read, aggregate MAX) — the indicator''s value source.


    **Spec reference:** UI_SPEC.md §Header (to be authored); DATA_MODEL.md §1.1 Source
    (`last_polled_at`).

    '
