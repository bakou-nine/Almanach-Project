        tags: []
        body: 'Header-bar refresh button + click handler + completion signal surface.
          Click → button enters loading state (spinner / disabled / animated icon)
          → backend `POST /refresh` triggers a synchronous poll cycle (same EP02 ingestion
          path as the scheduled cycle in US-260522-2050-001) → on completion, button
          exits loading state AND at least one of: a toast appears, a transient success/error
          state shows on the button, OR the header last-sync indicator (US-260522-2050-003)
