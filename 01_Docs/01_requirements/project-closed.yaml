          still ingest content for sites that publish no RSS or Atom feed.
        tags: []
        body: 'Step 3 of the FT02 waterfall. Called by US-260513-0000-004 only

          when both prior steps return `success: false`. Tries

          `GET /sitemap.xml` first (3 s timeout); if that fails or the XML

          is unparseable, tries `GET /news-sitemap.xml` (3 s timeout). On

          the first parseable XML response, returns

          `{step: "sitemap", success: true, feed_url: "<the sitemap URL>"}`

          — the sitemap URL itself is stored as Source.feed_url; EP02

          features handle the periodic parse of individual `<url>` /

          `<loc>` entries into Article rows. On both sitemap URLs failing,

          returns `{step: "sitemap", success: false, reason}` with reason

          in `{no_sitemap, sitemap_unparsable, fetch_error}` according to

          the dominant failure mode (404 on both → `no_sitemap`; parse

          error → `sitemap_unparsable`; timeout / DNS / 5xx → `fetch_error`).

          Stateless.


          **Data model fields touched:**


          - (none — stateless function.)


          **Spec reference:** DATA_MODEL.md §1.1 Source (`feed_url`,

          `discovery_method` target values).

          '
