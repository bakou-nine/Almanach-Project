        story_statement: As a user, I want a left-pane sidebar that always shows my
          list of news sources along with their unread counts, so that I can see at
          a glance what is in my feed and how much is unread.
        tags: []
        body: "Renders the left pane of the two-pane layout. Width 260 px,\nbackground\
          \ `--bg-secondary`. Three sections:\n\n- **Header (top):** \"SOURCES\" small-caps\
          \ label + `+` icon button\n  that triggers FT01 Source Add Flow.\n- **Source\
          \ list (middle):** \"All sources\" virtual entry at the\n  very top (stack\
          \ icon + label \"All sources\" + unread-count\n  pill = SUM of every Source's\
          \ unread count), 8 px gap, then\n  one row per Source (colour dot from `Source.colour`\
          \ +\n  `Source.display_name` with ellipsis on overflow + unread-count\n\
          \  pill for that source).\n- **Footer (bottom):** thin separator + \"Updated\
          \ N min ago\"\n  indicator (text sourced from EP04's header-bar last-sync\n\
          \  timestamp).\n\nServer-rendered on every page load. The state variants\
          \ (active,\nmuted) are handled by US-260513-0010-002. The partial-refresh\n\
          endpoint used by FT01 / FT04 / EP03 is owned by US-260513-0010-003.\n\n\
          **Data model fields touched:**\n\n- `Source.colour` (read) — colour dot.\n\
          - `Source.display_name` (read) — row label.\n- `Source.muted` (read) — to\
          \ omit unread count for muted rows\n  (the muted visual styling itself is\
          \ US-260513-0010-002).\n- `Article.read_at`, `Article.source_id` (read)\
          \ — for the\n  unread-count aggregation\n  (`COUNT(*) WHERE source_id =\
          \ ? AND read_at IS NULL`).\n\n**Spec reference:** UI_SPEC.md §Sidebar (to\
          \ be authored);\nDATA_MODEL.md §1.1 Source, §1.2 Article, §3\n(`idx_article_read_at_null`\
          \ partial index).\n"
