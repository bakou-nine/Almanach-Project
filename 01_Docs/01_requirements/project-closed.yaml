  body: "# CR01 — Promote / Demote menu actions + extend hierarchy controls to news\
    \ objects\n\n## Change Summary\n\nAdd explicit hierarchy-navigation affordances\
    \ to every object in the\nsidebar / feed tree. Two surfaces:\n\n1. **Menu-based\
    \ Promote / Demote.** Each row's ⋮ menu (source row, group\n   title, subgroup\
    \ title, AND article object — see point 2) gains\n   \"Promote\" (move one level\
    \ up) and \"Demote\" (move one level down,\n   nesting under preceding sibling).\
    \ Disabled when the move is illegal\n   (root for Promote; no preceding sibling\
    \ at same level or depth-cap\n   for Demote). Reference: CR-260523-0842-001 body\
    \ item 3.\n2. **News objects participate in hierarchy.** Today only sources,\n\
    \   groups, and subgroups are draggable (US-260522-2116-008). This CR\n   extends\
    \ drag-drop AND Promote/Demote menu actions to article objects,\n   so a user\
    \ can drag an article onto a group/subgroup (assigning it\n   there) or promote/demote\
    \ it via menu. Depth cap (5) still applies.\n   Reference: CR-260523-0842-001\
    \ body item 2 \"don't forget to do the\n   same for news object\".\n\n---\n\n\
    ## Affected Requirement Objects\n\n| ID — Title | Action | Status transition |\n\
    | :--- | :--- | :--- |\n| `US-260513-0020-001` — Action Menu Reveal | modified\
    \ (Promote/Demote items) | OPEN → OPEN |\n| `US-260522-2230-001` — Title Action\
    \ Menu | modified | CLOSED → OPEN |\n| `US-260522-2230-003` — Continuous-Scroll\
    \ Feed | modified (article rows draggable) | CLOSED → OPEN |\n| `FT-260512-2245-004`\
    \ — Source Row Action Menu | modified | SOLVED → OPEN |\n| `FT-260522-2115-001`\
    \ — Source Grouping & Organisation | modified | CLOSED → OPEN |\n\n---\n\n## Design\
    \ Changes\n\nWireframes under `01_Docs/03_design/01_wireframes/feature level/`\n\
    that show the row ⋮ menu must be updated to include Promote/Demote\nitems. Feed-pane\
    \ wireframes must add ⋮ affordance on article rows.\n\n## Data Model Changes\n\
    \n`Article` (DATA_MODEL.md §1.2) gains nullable `group_id` (FK to\n`group.id`\
    \ ON DELETE SET NULL) + `subgroup_id` (FK to `subgroup.id`\nON DELETE SET NULL)\
    \ + `position` REAL NOT NULL DEFAULT 0. Migration\nadditive, default NULL → articles\
    \ inherit grouping from their Source.\nIndexes: `idx_article_group_id`, `idx_article_subgroup_id`.\n\
    \n## Supersede / Versioning\n\n(none) — additive change to existing US bodies.\n\
    \n## Scope Impact Assessment\n\n- **Features affected:** FT-260512-2245-004, FT-260522-2115-001,\
    \ FT-260522-2230-001.\n- **Features blocked:** (none)\n- **Features unblocked:**\
    \ (none)\n- **Regression risk:** medium — drag-drop gets a new draggable type;\
    \ regression sweep on existing source/group/subgroup paths.\n- **Breaking changes:**\
    \ (none) — additive.\n\n---\n"
