  story_statement: As a user, I want the app to automatically poll my sources on a
    configurable interval (default 10 min) while the app is running, so that my feed
    stays fresh without me clicking refresh.
  tags: []
  body: 'Background scheduler that fires a poll cycle every N minutes (configurable;
    runtime default 10 min per BUG-260521-2051-001) while the app process is up. Each
    cycle iterates every non-muted Source and triggers the EP02 ingestion path. On
    successful completion of a source''s poll, updates `Source.last_polled_at` to
    the current timestamp.


    Lifecycle: scheduler is registered + started at app boot (FastAPI startup hook)
    and stopped cleanly at shutdown (no orphan threads). On boot, the first scheduled
    tick happens N minutes after boot — the app-open one-shot poll (US-260522-2050-002)
    covers the immediate refresh.


    **Data model fields touched:**


    - `Source.last_polled_at` (write) — current timestamp on successful poll.

    - `Source.muted` (read) — skip muted sources from polling? No: charter §3 / US-260513-0020-003
    mute keeps polling. Read only to confirm the source is still ingestable.

    - `Article.*` (write via EP02 ingestion) — new article rows on each cycle.


    **Spec reference:** Charter §3 (auto-refresh range 5–120 min, runtime default
    10 min per BUG02); DATA_MODEL.md §1.1 Source (`last_polled_at` write).

    '
