        approved_by_human: true
        cancellation_reason: null
        story_statement: As a user, I want the sidebar to render my folders as a recursive
          tree of arbitrary depth up to 5 levels — with aggregated unread counts walking
          the subtree — so that I can organise sources however deeply I want and still
          see meaningful counts at every level.
        tags: []
        body: "Recursive sidebar tree (CR-260522-2101-001 iteration 3). Extends\n\
          US-260513-0010-001's flat-list rendering: when at least one\nFolder exists,\
          \ the source-list block switches to a recursive\ntree layout; when no Folder\
          \ exists, it falls back to the flat\nlayout unchanged (regression guard\
          \ — AC-260522-2117-006 still\napplies).\n\nTree structure top-to-bottom:\n\
          \n1. \"All sources\" virtual entry (unchanged — global unread sum,\n   cascade-mute-aware\
          \ per AC-260522-2117-002 / -2234-001).\n2. Each root folder (`parent_id\
          \ IS NULL`) in `Folder.position`\n   order. Row = chevron + folder name\
          \ + aggregated unread pill.\n   Expanded by default unless `Folder.collapsed\
          \ = 1`.\n3. Recursively, under each expanded folder, in order:\n   a. Each\
          \ child folder (sub-folders in `Folder.position`\n      order). Same row\
          \ shape; the rendering function is the\n      same Jinja macro called recursively.\n\
          \   b. Each Source attached directly to this folder\n      (`Source.folder_id\
          \ = this.id`) in `Source.position`\n      order.\n4. \"Ungrouped\" zone\
          \ at the bottom (label always rendered, even\n   when empty): every Source\
          \ with `folder_id IS NULL`.\n\nDepth cap = 5: the recursion stops at depth\
          \ 5 by construction\n(no folder can exist with depth > 5 — enforced by\n\
          US-260522-2116-002 / AC-260522-2400-001). The renderer trusts\nthe cached\
          \ `folder.depth` value and styles indentation\naccordingly.\n\nIndentation\
          \ is computed from each folder's depth: each level\nadds a fixed visual\
          \ indent unit (CSS-driven). Sources under\na folder are indented one unit\
          \ beyond their parent folder.\n\nUnread-count aggregation (recursive):\n\
          \n- Source row pill: count of articles with `read_at IS NULL`\n  for that\
          \ source (unchanged from FT03).\n- Folder pill: sum of direct-source unread\
          \ counts + sum of\n  child-folder pills (recursive walk over `folder.parent_id`).\n\
          - When `Folder.muted = 1`, the pill is hidden (eye-off icon\n  shown instead)\
          \ and the folder contributes 0 to its parent's\n  pill (cascade — DATA_MODEL.md\
          \ §2.3).\n- \"All sources\" pill: cascade-mute-aware global sum (unchanged\n\
          \  contract).\n\nBackend computes the tree on each `GET /sidebar-partial`\
          \ call\n(US-260513-0010-003 endpoint). No client-side tree state — the\n\
          full tree is server-rendered, HTMX-swapped on changes.\n\n**Data model fields\
          \ touched:**\n\n- `Folder.id`, `Folder.parent_id`, `Folder.name`,\n  `Folder.position`,\
          \ `Folder.collapsed`, `Folder.muted`,\n  `Folder.depth` (read).\n- `Source.id`,\
          \ `Source.colour`, `Source.display_name`,\n  `Source.muted`, `Source.folder_id`\
          \ (read).\n- `Article.source_id`, `Article.read_at` (read — unread\n  aggregation;\
          \ `idx_article_read_at_null`).\n\n**Spec reference:** DATA_MODEL.md §1.4\
          \ Folder, §1.1\nSource.folder_id, §3 (`idx_folder_parent_id`,\n`idx_source_folder_id`),\
          \ §2.3 cascade-mute predicate.\n"
