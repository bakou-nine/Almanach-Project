        cancellation_reason: null
        story_statement: As a user, I want the sidebar to call a single `/folders`
          API to create / rename / move / delete folders at any depth (and a single
          /sources/{id}/parent endpoint to attach a source under any folder), so that
          my organisation changes persist and the sidebar re-renders consistently.
        tags: []
        body: "Net-new HTTP endpoints (CR-260522-2101-001 iteration 3 — replaces\n\
          the iteration-1 `/groups` + `/subgroups` endpoints). All endpoints\nreturn\
          \ JSON; the client re-fetches `/sidebar-partial` after each\nsuccessful\
          \ write.\n\n**Folder endpoints:**\n\n- `POST /folders` body `{ name, parent_id?\
          \ }` — 201 with the\n  new folder id. Validation:\n  - `name` 1-60 chars\
          \ after trim (422 `error: invalid_name`).\n  - `parent_id`, when set, must\
          \ reference an existing folder\n    (422 `error: parent_not_found`).\n \
          \ - Resulting `depth = parent.depth + 1` must be ≤ 5 (422\n    `error: depth_limit`).\n\
          - `PATCH /folders/{id}` body `{ name? collapsed? muted?\n  position? parent_id?\
          \ }`:\n  - Same name validation when supplied.\n  - When `parent_id` is\
          \ supplied, the move must:\n    - Not create a cycle (target cannot be a\
          \ descendant of\n      the source folder).\n    - Not push any descendant\
          \ past depth 5\n      (`new_depth_of_root + max_subtree_depth ≤ 5`).\n \
          \   Either violation returns 422 with `error: depth_limit` or\n    `error:\
          \ cycle`.\n  - On successful parent change, every descendant's cached\n\
          \    `depth` is recomputed in the same transaction.\n- `DELETE /folders/{id}`\
          \ — 204. Cascade deletes descendants\n  (`folder.parent_id` FK CASCADE).\
          \ Member sources at any\n  depth detach to Ungrouped (`source.folder_id`\
          \ SET NULL\n  via FK).\n\n**Source reassign endpoint** (updated):\n\n- `PATCH\
          \ /sources/{id}/parent` body\n  `{ folder_id?, position? }`. `folder_id\
          \ = null` means\n  Ungrouped. Validation:\n  - `folder_id`, when set, must\
          \ reference an existing folder\n    (422 `error: parent_not_found`).\n-\
          \ `position` is REAL — average of adjacent siblings'\n  positions (computed\
          \ client-side by US-260522-2116-008).\n\n**Retired endpoints:** `/groups`\
          \ (POST/PATCH/DELETE) and\n`/subgroups` (POST/PATCH/DELETE) are removed\
          \ entirely.\nIteration-2 callers are rewired to `/folders` in the same\n\
          dev cycle.\n\n**Banner-coupled folder creation:** the first successful\n\
          POST /folders sets `grouping_banner_dismissed = 1` in the\nsame transaction\
          \ (iteration-1 AC-260522-2118-030 contract,\nretargeted to the folder endpoint).\n\
          \n**Data model fields touched:**\n\n- `Folder.*` (write).\n- `Source.folder_id`\
          \ (write).\n- `Settings.grouping_banner_dismissed` (write — banner\n  auto-dismiss\
          \ on first folder create).\n\n**Spec reference:** DATA_MODEL.md §1.4, §1.1\
          \ Source.folder_id;\n§2 cascades.\n"
        acceptance_criteria: null
