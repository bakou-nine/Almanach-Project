        approved_by_human: true
        cancellation_reason: null
        story_statement: As a user, I want to drag any folder or source anywhere in
          the sidebar tree — reorder siblings via above/below
        tags: []
        body: "Notion / Logseq outliner drag-and-drop, applied uniformly across\n\
          the recursive folder tree (CR-260522-2101-001 iteration 3 —\nreplaces the\
          \ iteration-2 Group + Subgroup type discrimination\nwith a single Folder\
          \ type).\n\n**Two draggable types:** Folder row and Source row. The same\n\
          drop logic applies at every depth from 1 to 5.\n\n**Drop intent computation**\
          \ (unchanged from iteration 2):\n\n- **Y-axis (above / below):** cursor\
          \ Y relative to the row's\n  mid-line picks sibling-above (top half) or\
          \ sibling-below\n  (bottom half).\n- **X-axis (indent / outdent):** cursor\
          \ X relative to the\n  row's content-start picks the nesting depth.\n  -\
          \ At the row's content X → sibling at the same level.\n  - Right of the\
          \ row's content X → become a child of that\n    target row.\n  - Left of\
          \ the row's content X → outdent (become a sibling\n    of the target's parent).\n\
          \n**Per dragged-type validity:**\n\n- **Folder row** drag-and-drop options:\n\
          \  - Sibling-reorder among same-parent folders at the SAME\n    depth →\
          \ adjusts `Folder.position` only (PATCH\n    /folders/{id} `{ position }`).\n\
          \  - Cross-parent move (drop-as-child on another folder, OR\n    drop next\
          \ to a folder under a different parent) →\n    PATCH /folders/{id} `{ parent_id,\
          \ position }`.\n  - Depth-cap guard: moves that would push any descendant\n\
          \    past depth 5 are rejected at the API with 422\n    `error: depth_limit`\
          \ (US-260522-2116-002 enforcement).\n    The client also pre-checks the\
          \ implied new depth and\n    cancels the drop with a quiet revert when violated.\n\
          \  - Cycle guard: moving a folder under one of its own\n    descendants\
          \ is rejected (422 `error: cycle`); client\n    pre-checks the drop target's\
          \ ancestry and reverts.\n  - Outdent (drop-as-sibling-of-parent via left\
          \ X-offset):\n    promotes the folder one level up — `parent_id` becomes\n\
          \    the current parent's `parent_id`, `position` placed near\n    the parent.\n\
          - **Source row** drag-and-drop options:\n  - Drop on any folder (at any\
          \ depth 1..5), in any drop\n    intent → `Source.folder_id` becomes that\
          \ folder's id.\n    Drop-as-child of a folder → attach directly to that\n\
          \    folder; drop-as-sibling-of-folder → attach to the\n    folder's parent\
          \ (or Ungrouped if root).\n  - Drop on another source → attach to that source's\n\
          \    `folder_id` (its parent folder, or Ungrouped if NULL).\n  - Drop on\
          \ the Ungrouped zone → `folder_id = NULL`.\n  - Sibling-reorder among same-parent\
          \ sources → adjusts\n    `Source.position` via PATCH /sources/{id}/parent.\n\
          \n**During drag** (unchanged visual contract):\n\n- Cursor changes to \"\
          grabbing\"; origin row dims to ~45%.\n- Horizontal drop indicator (2 px\
          \ indigo bar) renders at the\n  implied insertion line for sibling drops;\
          \ dashed outline\n  around the target row for drop-as-child drops.\n- Invalid\
          \ drops (dropping a folder onto its own row, onto a\n  descendant, cycle,\
          \ depth-cap violation, etc.) → no\n  indicator, no PATCH on release, silent\
          \ revert.\n\n**Drop payloads (single-endpoint surface after iteration 3):**\n\
          \n- Source moves: `PATCH /sources/{id}/parent`\n  `{ folder_id?, position?\
          \ }`.\n- Folder moves: `PATCH /folders/{id}`\n  `{ parent_id?, position?\
          \ }`.\n\nThe server stores explicit `position` (REAL) values; the\nclient\
          \ computes the target position as the midpoint between\nadjacent siblings\
          \ (or `prev - 1` / `next + 1` at the edges).\nRenormalisation, if ever needed,\
          \ is server-side and\nopportunistic.\n\n**Data model fields touched:**\n\
          \n- `Source.folder_id`, `Source.position` (write).\n- `Folder.parent_id`,\
          \ `Folder.position`, `Folder.depth`\n  (write — depth recomputed on parent\
          \ change).\n\n**Spec reference:** DATA_MODEL.md §1.1 Source.folder_id, §1.4\n\
          Folder; the human-supplied screenshot at\n01_Docs/04_content/images/screenshot.png\
          \ shows a depth-2 tree\nfor illustration — the contract here generalises\
          \ that pattern\nto depth ≤ 5.\n"
        acceptance_criteria: null
