  body: '# CR — Keyword filter for the right-pane feed


    ## Change Summary

    User request: the right-pane filter bar should let the reader constrain the feed
    to articles that contain given keyword(s). Adds a keyword input to the existing
    filter bar (US-260523-1906-001), alongside the date-range, date-shortcut, and
    content-selection controls. Typing a word and pressing Enter adds it as an active
    keyword chip (removable via × or Clear all); multiple keywords may be added. A
    keyword matches when an article title or summary contains it (case-insensitive
    substring). No article body text is stored, so title + summary is the full match
    scope.


    **Scope revision (TEST-260524-0715-001, §5.2.4 step 3):** the keyword control
    was re-specified from a single live-filtered term to multiple Enter-added chips,
    and an Any/All toggle (AC-260524-0730-001) was added so the reader chooses how
    the active keywords combine — Any = OR (match at least one), All = AND (match
    all), default Any. The keyword group still composes via AND with the date and
    content-selection filters. Also fixes the reported "search has no effect on content"
    defect (verified end-to-end against the feed query: baseline 9105 -> single keyword
    70; ANY 103 >= ALL 14).


    New behaviour the feed feature does not currently assert -> new AC per §3.4 dedup
    (not extensions of the date/content AC).


    ---


    ## Affected Requirement Objects

    | ID — Title | Action | Status transition |

    | :--- | :--- | :--- |

    | `US-260523-1906-001` — Feed Filter Bar | modified (gains keyword control + keyword
    predicate on the feed query) | CLOSED -> OPEN (CR promotion, §5.2.2) |


    ---


    ## Design Changes

    (none) — reuses the existing filter-bar layout and the chip / empty-state conventions
    (AC-260523-1500-001 / 006 / 007). No new wireframe.


    ## Data Model Changes

    (none) — no schema change. Keyword predicate applied at query time over `Article.title`
    (not null) and `Article.summary` (nullable). DATA_MODEL.md §2.2.


    ## Supersede / Versioning

    (none)


    ## Scope Impact Assessment

    - **Features affected:** FT-260522-2230-001 (Continuous-Scroll Feed) — `/feed-partial`
    gains an optional keyword param; the filter bar gains the keyword control.

    - **Features blocked:** (none)

    - **Features unblocked:** (none)

    - **Regression risk:** low — the keyword param is additive and optional; existing
    filter AC and unfiltered-feed AC must continue to pass when no keyword is set.

    - **Breaking changes:** (none)


    ---

    '
