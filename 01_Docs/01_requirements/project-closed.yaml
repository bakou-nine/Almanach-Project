    server rejection.\n\n## Test Instructions\n\n1. Build a chain F1 → F2 → F3 → F4\
    \ → F5 plus a sibling F1' (depth\n   1) at root level.\n2. Drag F4 onto F1' with\
    \ right X-offset (drop-as-child). Confirm\n   F4's parent becomes F1' (depth 2),\
    \ F5 follows (depth 3). DB:\n   `folder.depth` updated for both rows.\n3. Drag\
    \ F4 onto F5 with right X-offset. This would push F5 to\n   depth 4 and make F5's\
    \ children deeper than 5 — wait, F5 has\n   no children, so this is depth 5 for\
    \ F4 and depth 6 if F5 had\n   any. With no descendants, the move is depth 5 for\
    \ F4 (valid).\n   Confirm 200.\n4. Build an Ax → Ay sibling chain at root, deepen\
    \ Ay to 4 levels\n   (Ay → Ay2 → Ay3 → Ay4). Drag Ax onto Ay4 with right X-offset\n\
    \   — would push Ax to depth 5 (OK). Confirm 200. Re-drag any\n   further child\
    \ to push past depth 5 — confirm silent client\n   revert AND 422 if the request\
    \ is allowed through.\n5. Drag a source under F5 leftward (outdent) — confirm\
    \ it lands\n   as a sibling of F5 under F4 (same folder, not a child of F4\n \
    \  through F5).\n6. Drag a source onto the Ungrouped zone — confirm `folder_id`\n\
    \   becomes NULL.\n7. Drag any folder onto one of its own descendants — confirm\n\
    \   silent revert (cycle guard) AND 422 `error: cycle` if the\n   request reaches\
    \ the server.\n"
