  body: '# BUG01 — Single source 3 dot button


    ## Defect Summary


    Three separate defects observed on the per-source ⋮ action menu (FT-260512-2245-004)
    on the sidebar. Reported by HUMAN via Filum on 2026-05-21.


    1. Menu auto-closes too aggressively — the floating menu disappears as soon as
    the cursor moves off the spawning row, even when the cursor is over the menu surface.
    Expected per US-260513-0020-001: menu stays visible while cursor is over the menu
    OR the row, closes only after >300 ms off both.

    2. Remove action (US-260513-0020-004) does not delete the source — clicking Remove
    → confirming produces no DB delete and the sidebar row remains.

    3. Mute action (US-260513-0020-003) has no visible effect — the row''s muted visual
    state (US-260513-0010-002: opacity ~0.5, strikethrough, eye-off icon) is not applied,
    and the menu label / icon does not toggle from Mute to Unmute on re-open.


    ![3 dot bugs](01_docs/04_content/images/3 dot bugs.png)


    ---


    ## Affected Requirements (CONFIRMS targets)


    - `US-260513-0020-001` — Action Menu Reveal — failing AC: AC-260522-2030-001 (defect
    #1).

    - `US-260513-0020-004` — Remove Action — failing AC: AC-260522-2030-002 (defect
    #2).

    - `US-260513-0020-003` — Mute / Unmute Action — failing AC: AC-260522-2030-003,
    AC-260522-2030-004 (defect #3).

    - `US-260513-0010-002` — Source-Row State Variants — failing AC: AC-260522-2030-003
    (defect #3 visual sub-issue, multi-FULFILLS).


    ---


    ## Technical Approach


    **Files / functions to change:**


    - `02_code/filum/frontend/templates/_design-system/molecules/row-action-menu.html`
    — menu hover/auto-close logic.

    - `02_code/filum/frontend/static/css/design-system/molecules/row-action-menu.css`
    — hover-bridge styling so the menu surface keeps the row hover-active.

    - `02_code/filum/frontend/templates/_design-system/organisms/sidebar.html` — per-row
    menu spawning + mute label binding.

    - `02_code/filum/frontend/__init__.py` — verify `DELETE /sources/{id}` and `PATCH
    /sources/{id}/mute` routes are wired and not silently 404-ing.

    - Backend: `02_code/filum/backend/sources.py` (or wherever the source CRUD lives)
    — confirm cascade-delete and mute toggle commit to DB.


    **Root cause (hypotheses — confirm during fix):**


    - Defect #1: menu likely uses `:hover` only on the spawning row with no hover-bridge
    over the floating menu surface; cursor moving onto the menu collapses the row''s
    hover state and the menu hides. Fix = pointer-events hover-bridge OR JS open-state
    separated from row hover.

    - Defect #2: most likely the frontend POSTs to a path that doesn''t match the
    Flask route, or the JS handler is bound to the wrong button. Confirm by inspecting
    browser network tab on click.

    - Defect #3: mute PATCH may succeed silently but the sidebar partial refresh (US-260513-0010-003)
    is not re-fetched, OR the muted-state CSS class is keyed to a flag the template
    doesn''t pass through, OR the menu label is statically rendered without binding
    to `Source.muted`.


    **Fix outline:**


    1. Reproduce each defect locally and capture network + console state.

    2. Fix defect #1 first (purely frontend — design-system molecule). Apply §6.7
    pre-flight before any frontend write.

    3. Fix defect #2 — restore Remove wiring end to end. Verify cascade delete by
    inspecting DB after click-confirm.

    4. Fix defect #3 — restore Mute wiring, ensure sidebar partial refresh fires post-PATCH,
    and bind menu label / icon to live `Source.muted`. Cross-check US-260513-0010-002
    muted visual fires.

    5. Run §6.7 post-edit static checks + visual confirmation gate on every preview
    surface after any frontend file is touched.


    ---

    '
