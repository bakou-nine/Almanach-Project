        updated_at: '2026-05-23T08:09:18.949430'
        updated_by: HUMAN
        approved_by_human: true
        cancellation_reason: null
        story_statement: I want a single recursive `folder` table (self-referential
          via `parent_id`) capped at 5 levels of nesting, so that the sidebar tree
          can grow to arbitrary subtitle depth without piling up parallel tables for
          each level.
        tags: []
        body: "Recursive folder model (CR-260522-2101-001 iteration 3,\nreplaces the\
          \ iteration-1 Group + Subgroup two-table schema).\n\n**Schema — single self-referential\
          \ `folder` table:**\n\n- `folder.id` TEXT PK (UUID v4).\n- `folder.parent_id`\
          \ TEXT FK → `folder.id` ON DELETE CASCADE,\n  nullable. NULL = root folder.\n\
          - `folder.name` TEXT NOT NULL. 1-60 chars after trim\n  (validation owned\
          \ by US-260522-2116-002).\n- `folder.position` REAL NOT NULL DEFAULT 0.\
          \ Sort order among\n  siblings sharing the same `parent_id`. REAL so the\n\
          \  Notion-style D&D midpoint math (US-260522-2116-008) doesn't\n  need renormalisation\
          \ on every drop.\n- `folder.collapsed` INTEGER NOT NULL DEFAULT 0.\n- `folder.muted`\
          \ INTEGER NOT NULL DEFAULT 0. Cascade per\n  DATA_MODEL.md §2.3 — a muted\
          \ folder hides every descendant\n  source's articles from the combined feed.\n\
          - `folder.depth` INTEGER NOT NULL DEFAULT 1. Cached depth\n  (root = 1).\
          \ Used for cheap depth-cap enforcement.\n- `folder.created_at` TEXT (ISO8601)\
          \ NOT NULL.\n\n**Depth cap = 5** (root folder = depth 1, deepest leaf folder\n\
          = depth 5). Inserts and parent-change moves that would push\nany descendant's\
          \ depth above 5 are rejected at the API layer\nwith 422 `error: depth_limit`\
          \ (AC-260522-2400-001).\n\n**Source attachment:**\n\n- `source.folder_id`\
          \ TEXT FK → `folder.id` ON DELETE SET NULL,\n  nullable. NULL = Ungrouped\
          \ zone.\n- Replaces the iteration-1 pair `source.group_id` +\n  `source.subgroup_id`\
          \ (those columns are dropped after the\n  iteration-3 backfill — AC-260522-2400-002).\n\
          \n**Iteration-3 migration (idempotent — applies once on the\nfirst iteration-3\
          \ boot of a DB that still carries iteration-1\nschema):**\n\n1. CREATE TABLE\
          \ folder if missing.\n2. ALTER TABLE source ADD COLUMN folder_id if missing.\n\
          3. INSERT INTO folder one row per existing `group` row,\n   setting `depth=1,\
          \ parent_id=NULL`. Preserve `id`, `name`,\n   `position`, `collapsed`, `muted`,\
          \ `created_at`.\n4. INSERT INTO folder one row per existing `subgroup` row,\n\
          \   setting `depth=2, parent_id=<the matched group folder id>`.\n   Preserve\
          \ fields likewise.\n5. UPDATE source SET folder_id = (COALESCE matched subgroup\n\
          \   folder id, matched group folder id). Subgroup wins when\n   both were\
          \ set (mirrors the iteration-1 invariant — sources\n   always rendered at\
          \ their deepest attachment).\n6. DROP TABLE subgroup; DROP TABLE `group`.\n\
          7. ALTER TABLE source DROP COLUMN subgroup_id; DROP COLUMN\n   group_id.\n\
          \nNo article row is rewritten or deleted. Counts preserved\nexactly per\
          \ AC-260522-2117-007 / AC-260522-2400-002.\n\n**Indexes:**\n\n- `idx_folder_parent_id\
          \ ON folder(parent_id)` — tree walk.\n- `idx_source_folder_id ON source(folder_id)`\
          \ — tree\n  rendering pull-by-parent.\n\n**Data model fields touched:**\n\
          \n- `Folder.*` (write — DDL + migration).\n- `Source.folder_id` (write —\
          \ DDL + backfill).\n- `Source.group_id`, `Source.subgroup_id` (dropped after\n\
          \  backfill — destructive, but preceded by INSERT-SELECT into\n  folder\
          \ so no data lost).\n\n**Spec reference:** DATA_MODEL.md §1.4 Folder (rewritten),\n\
          §1.1 Source (`folder_id` field), §2 (cascades), §3 (indexes),\n§7 (iteration-3\
          \ migration).\n"
