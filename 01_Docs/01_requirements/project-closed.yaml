  body: "## Description\n\nIteration-3 migration safety. Walks the iteration-1 → iteration-3\n\
    schema transition: every Group becomes a depth-1 Folder, every\nSubgroup becomes\
    \ a depth-2 Folder under its parent group's folder,\nevery Source's `folder_id`\
    \ is set to the deepest matched ancestor\n(subgroup wins over group).\n\n## Test\
    \ Instructions\n\n1. On a pre-iteration-3 DB with N groups, M subgroups, K sources,\n\
    \   L articles: snapshot N, M, K, L.\n2. Run the iteration-3 migration (boot the\
    \ app — or call\n   `db.initialise()` explicitly).\n3. After migration, verify:\n\
    \   - `SELECT COUNT(*) FROM folder` returns N + M.\n   - Every former group row\
    \ now lives as a folder with\n     `parent_id IS NULL`, `depth = 1`, same `name`/`position`/\n\
    \     `collapsed`/`muted`/`created_at`.\n   - Every former subgroup row now lives\
    \ as a folder with\n     `parent_id = <its old group's new folder id>`, `depth\
    \ = 2`,\n     preserved fields.\n   - `SELECT COUNT(*) FROM source` returns K\
    \ (preserved).\n   - `SELECT COUNT(*) FROM article` returns L (preserved).\n \
    \  - Every source that previously had `subgroup_id` set has\n     `folder_id =\
    \ <that subgroup's new folder id>`.\n   - Every source that had only `group_id`\
    \ set has\n     `folder_id = <that group's new folder id>`.\n   - Every source\
    \ that had both FKs NULL has `folder_id IS NULL`\n     (Ungrouped — preserved).\n\
    4. Verify `subgroup` and `group` tables have been dropped\n   (`SELECT name FROM\
    \ sqlite_master WHERE type='table'` no longer\n   lists them).\n5. Verify `source.group_id`\
    \ and `source.subgroup_id` columns no\n   longer exist (`PRAGMA table_info(source)`).\n"
