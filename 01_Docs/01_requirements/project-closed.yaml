        tags: []
        body: "Backend route `GET /sidebar-partial` that returns the HTML\nfragment\
          \ for the source-list block of the sidebar — same\ncontent as US-260513-0010-001\
          \ produces, but WITHOUT the\nsurrounding header / footer (just the rows\
