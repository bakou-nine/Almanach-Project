  body: '# BUG01 — Row ⋮ floating menu clips below viewport


    ## Defect Summary


    Clicking the ⋮ icon on a source / group / subgroup row whose Y position

    sits in the bottom half of the viewport opens the floating menu in a

    fixed position that extends past the bottom of the visible viewport.

    Rename / Mute / Remove (and FT05 title-menu equivalents) render off-screen

    and cannot be reached without scrolling. Affects FT04 source ⋮

    (US-260513-0020-001) and FT05 title ⋮ (US-260522-2230-001). Reference:

    CR-260523-0842-001 body item 1 +

    01_Docs/04_content/images/drop down not visible.png.


    ---


    ## Affected Requirements (CONFIRMS targets)


    - `US-260513-0020-001` — Action Menu Reveal — failing AC: AC-260523-0900-001

    - `US-260522-2230-001` — Title Action Menu — failing AC: AC-260523-0900-001, AC-260523-0900-002

    - `FT-260512-2245-004` — Source Row Action Menu — failing AC: AC-260523-0900-001

    - `FT-260522-2115-001` — Source Grouping & Organisation — failing AC: AC-260523-0900-002


    ---


    ## Technical Approach


    **Files / functions to change:**


    - `02_code/filum/frontend/templates/_design-system/organisms/row-action-menu.html`

    - `02_code/filum/frontend/static/css/design-system/organisms/row-action-menu.css`

    - popover-positioning JS that anchors the menu beside the clicked ⋮ button.


    **Root cause:**


    Menu is positioned with fixed `top: 100%` offset below trigger without

    checking viewport overflow. When trigger is in the bottom half of the

    viewport, `top: 100%` pushes the menu past `window.innerHeight`.


    **Fix outline:**


    Viewport-overflow detection on open: compute

    `triggerRect.bottom + menuHeight` against `window.innerHeight`. On

    downward overflow, flip the menu to open upward (anchor on

    `bottom: 100%` of trigger). On both-axes overflow, constrain the menu

    to the viewport with internal body scroll. Mirror logic horizontally

    for left-edge overflow. Land the fix in the shared `row-action-menu`

    organism (§6.5 edit-at-lowest-level rule) so FT04 + FT05 surfaces are

    fixed together. Pre-flight §6.7 before any frontend write.


    ---

    '
