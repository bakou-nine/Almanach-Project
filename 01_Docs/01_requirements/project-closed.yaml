  tags: []
  body: 'One-shot poll fired during app startup (FastAPI startup hook, after scheduler
    registration but before the first scheduled tick). Same per-source iteration +
    EP02 ingestion as the periodic cycle (US-260522-2050-001), but runs exactly once
    per process boot and writes `Source.last_polled_at` on success.


    Resolves BUG-260521-2051-001 defect #3''s auto-sync-on-open expectation. The header''s
    last-sync indicator (US-260522-2050-003) reads MAX(`Source.last_polled_at`) and
    therefore reflects this boot-time poll within seconds of app open.


    **Data model fields touched:**


    - `Source.last_polled_at` (write) — current timestamp on successful boot-time
    poll.

    - `Article.*` (write via EP02 ingestion) — any new article rows landed during
    the boot poll.


    **Spec reference:** DATA_MODEL.md §1.1 Source (`last_polled_at`); FastAPI startup
    hook docs (lifespan event).

    '
