  cancellation_reason: null
  tags: []
  body: '## Description


    Combine-mode control for multiple keywords (CR-260524-0644-001 scope change per

    TEST-260524-0715-001). When two or more keywords are active, a Match any / Match
    all toggle in

    the keyword group sets how they combine: Match any = OR (article matches if its
    title or

    summary contains at least one active keyword), Match all = AND (article matches
    only if

    it contains every active keyword). Default is Match any. The toggle is hidden
    while fewer

    than two keywords are active (it has no effect then). The keyword group as a whole

    still composes via AND with the date and content-selection filters (AC-260524-0650-002).


    ## Test Instructions


    1. On the main feed, add two keywords that each appear in some articles (type
    each, press Enter). Note roughly how many articles show.


    2. Verify a "Match any / Match all" toggle is now visible in the keyword area,
    with "Match any" selected by default.


    3. With "Match any" selected, verify the feed shows articles that contain EITHER
    keyword (the broader set).


    4. Click "Match all". Verify the feed narrows to only articles that contain BOTH
    keywords (a smaller or equal set).


    5. Click "Match any" again. Verify the feed widens back to the either-keyword
    set.


    6. Remove one keyword (chip ×) so only one remains. Verify the Match any / Match
    all toggle disappears.

    '
