  body: '# BUG02 — Last synch and manual refresh bugs


    ## Defect Summary


    Five related defects on the header bar''s last-sync indicator + manual refresh
    button + sidebar footer ''Updated'' text. Cuts across EP03 (Background Polling)
    and EP04 (Feed Reading Experience). Reported by HUMAN via Filum on 2026-05-21.


    1. Background polling is not running on a 10-minute cadence as expected — the
    auto-refresh either never fires or fires on a different schedule. Note: charter
    §3 defaults to 20 min (range 5–120 min, configurable); the user expects 10 min
    as the configured value — if 10 min reflects a deliberate default change, this
    defect-1 element is closer to a CR scope tweak, but kept under this BUG since
    the broader defect is that auto-refresh isn''t working at all. Confirm cadence
    + configurability during fix.

    2. Manual refresh button gives no completion feedback — clicking it produces no
    visible indication that the refresh has finished (no toast, no spinner-off transition,
    no updated last-sync text).

    3. The header''s ''last sync · N min ago'' indicator does not reflect the real
    most-recent successful poll across sessions — when the app is re-opened, last-sync
    shows ''never'' / ''unknown'' instead of the timestamp from the previous session''s
    last successful poll. The user also expects a one-shot auto-sync on app open so
    ''last sync'' equals the open moment.

    4. After a manual or scheduled refresh, the header''s ''last sync'' text does
    not re-render to the new timestamp — it remains stale.

    5. The sidebar footer currently shows ''Updated never'' (per FT-260512-2245-003
    FT03 body) which both is wrong (state-disconnected) and duplicates the header''s
    last-sync surface. Single source of truth should be the header indicator; the
    sidebar footer ''Updated'' line should be removed.


    ![last synch and manual bugsrefresh](01_docs/04_content/images/last synch and
    manual  bugsrefresh.png)


    ---


    ## Affected Requirements (CONFIRMS targets)


    - `US-260522-2050-001` — Periodic Poll Scheduler — failing AC: AC-260522-2030-005
    (defect #1).

    - `US-260522-2050-002` — App-Open Initial Poll — failing AC: AC-260522-2030-008
    (defect #3 auto-sync sub).

    - `US-260522-2050-003` — Last-Sync Indicator Display — failing AC: AC-260522-2030-007
    (defect #3 indicator sub), AC-260522-2030-009 (defect #4).

    - `US-260522-2050-004` — Manual Refresh Button — failing AC: AC-260522-2030-006
    (defect #2).

    - `US-260513-0010-001` — Sidebar Rendering — failing AC: AC-260522-2030-010 (defect
    #5, sidebar footer ''Updated'' line removal).


    **WBS note:** EP-260512-2230-003 and EP-260512-2230-004 were decomposed in the
    same backfill cycle as this BUG so the AC could be properly multi-FULFILLS''d
    to US-level hosts (per the user''s request). The two new features (FT-260522-2050-001
    Scheduler Lifecycle & Cadence, FT-260522-2050-002 Header Bar Last-Sync Indicator)
    are minimum-impact carves — only what the BUG02 AC needed. The rest of EP03 /
    EP04 remains undecomposed pending future §5.1.1 rounds.


    ---


    ## Technical Approach


    **Files / functions to change:**


    - `02_code/filum/backend/scheduler.py` (or APScheduler bootstrap) — confirm the
    periodic job is registered, fires on configured cadence, and uses the correct
    interval setting.

    - `02_code/filum/backend/sources.py` — manual refresh endpoint (`POST /refresh`
    or similar) returns a structured completion payload the frontend can render against.

    - `02_code/filum/backend/app_lifecycle.py` (or wherever startup hooks live) —
    wire a one-shot poll on app open per defect #3 expectation.

    - `02_code/filum/frontend/templates/_design-system/organisms/header.html` — last-sync
    indicator binding + manual refresh button loading/completion states.

    - `02_code/filum/frontend/static/css/design-system/organisms/header.css` — refresh
    button loading + done transient state.

    - `02_code/filum/frontend/templates/_design-system/organisms/sidebar.html` — remove
    the footer ''Updated N min ago'' line per defect #5.

    - `02_code/filum/frontend/__init__.py` — verify the manual-refresh route + the
    partial that re-renders the header last-sync text.

    - Persistence: ensure `Source.last_polled_at` is committed on every successful
    poll (charter §3) so cross-session last-sync survives.


    **Root cause (hypotheses — confirm during fix):**


    - Defect #1: scheduler not started, or interval setting is hardcoded to a non-10
    value, or job silently raises on first run.

    - Defect #2: refresh endpoint returns 204 / no body and the frontend has no success
    handler binding to it.

    - Defect #3: header last-sync is computed at template render time against an in-process
    variable instead of the persisted `Source.last_polled_at` max; on a fresh process
    the variable is null even if the DB has prior timestamps. Plus no startup-poll
    wiring.

    - Defect #4: header last-sync element is rendered server-side once and never refreshed
    via partial swap after poll completion.

    - Defect #5: sidebar footer ''Updated N min ago'' is hardcoded literal in the
    FT03 template AND is sourced from a stale variable that defaults to ''never''.


    **Fix outline:**


    1. Confirm the actual current state of the scheduler + last-sync wiring (read
    backend + frontend files end to end) before changing anything.

    2. Confirm with the user (in Filum review of this BUG) whether 10 min is the desired
    auto-refresh interval (vs charter §3 default 20 min) — if it''s truly a deliberate
    value change, that part may need to be re-triaged as a CR. Default proceed: configurable,
    set to 10 min as the runtime value.

    3. Fix scheduler → ensure a poll fires every 10 min while the app is up, plus
    a one-shot poll on app open.

    4. Make `Source.last_polled_at` the persisted source of truth; header reads the
    MAX across all non-muted sources.

    5. Wire the manual refresh button + endpoint round-trip so completion is visible
    (button transient state + header last-sync re-render).

    6. Remove the sidebar footer ''Updated'' line. Update FT-260512-2245-003 body
    if scope change is confirmed — but that requirement edit is a §5.2.4 CR-class
    change, NOT to be made inside this BUG fix. Flag for the human during review.

    7. Apply §6.7 pre-flight before any frontend write and the post-edit static +
    visual confirmation gate after every frontend write.


    ---

    '
